const exVol=(e,bw=0)=>e.sets.reduce((a,s)=>a+(s.r||0)*(s.w>0?s.w:(e.bw?bw:0)),0);
const sessVol=(s,bw=0)=>s.ex.reduce((a,e)=>a+exVol(e,bw),0);
const bestW=e=>Math.max(0,...e.sets.map(s=>s.w||0));
const bestSet=e=>e.sets.reduce((b,s)=>(s.w||0)>(b.w||0)?s:b,{w:0,r:0});
const oneRM=(w,r)=>(r>=1&&r<=10&&w>0)?Math.round(w*36/(37-r)):null;
const bestRM=e=>{let b=0;e.sets.forEach(s=>{const rm=oneRM(s.w,s.r);if(rm&&rm>b)b=rm;});return b||null;};
function computeIntensityScore(session, allSessions){
  // For each weighted exercise: compare session 1RM vs historical best 1RM
  // For sets with RPE: convert to intensity %
  const prev = allSessions.filter(s => s.id !== session.id);
  const rmScores = [], rpeScores = [];

  session.ex.forEach(ex => {
    if(ex.bw || ex.skipped) return;
    const sets = ex.sets.filter(s => s.done && s.w > 0 && s.r > 0);
    if(!sets.length) return;

    // Session best 1RM
    const sessionRM = Math.max(...sets.map(s => oneRM(s.w, s.r) || s.w));
    // Historical best 1RM (excluding this session)
    const histRMs = prev.flatMap(ps => ps.ex.filter(e => e.id === ex.id)
      .flatMap(e => e.sets.filter(s => s.w > 0 && s.r > 0).map(s => oneRM(s.w, s.r) || s.w)));
    const histBest = histRMs.length ? Math.max(...histRMs) : 0;
    if(histBest > 0) {
      rmScores.push(Math.min(1, sessionRM / histBest));
    } else if(sessionRM > 0) {
      rmScores.push(1); // first ever session = 100% by definition
    }

    // RPE scores for this exercise
    const rpeSets = sets.filter(s => s.rpe);
    if(rpeSets.length) {
      const avgRpe = rpeSets.reduce((a, s) => a + s.rpe, 0) / rpeSets.length;
      // rpe 1=😌→65%, 2=😤→82.5%, 3=💀→100%
      rpeScores.push((avgRpe - 1) / 2 * 0.35 + 0.65);
    }
  });

  if(!rmScores.length) return null;
  const rm = rmScores.reduce((a,b)=>a+b,0) / rmScores.length;
  const rpe = rpeScores.length ? rpeScores.reduce((a,b)=>a+b,0) / rpeScores.length : null;
  const score = rpe !== null ? rm * 0.6 + rpe * 0.4 : rm;
  return Math.round(score * 100);
}

function intensityMeta(score){
  if(score === null) return {lbl:"—", col:"var(--t3)", desc:"Données insuffisantes"};
  if(score < 50)  return {lbl:"RÉCUP",   col:"#38bdf8", desc:"Séance de récupération active"};
  if(score < 70)  return {lbl:"MODÉRÉ",  col:"#00e5a0", desc:"Intensité modérée"};
  if(score < 85)  return {lbl:"INTENSE", col:"#f97316", desc:"Séance intense"};
  return           {lbl:"MAXIMUM", col:"#f87171", desc:"Effort maximal"};
}

function BarSvg({data,h=130}){
  if(!data||!data.length)return null;
  const max=Math.max(...data.map(d=>d.v),1),n=data.length,bh=h-26,sp=100/n;
  return(
    <svg width="100%" height={h} style={{display:"block",overflow:"visible"}}>
      {data.map((d,i)=>{
        const barH=Math.max(2,Math.round((d.v/max)*bh)),x=i*sp+sp*.08,bw=sp*.84;
        return(<g key={i}>
          <rect x={x+"%"} width={bw+"%"} y={bh-barH+2} height={barH} fill={d.col||"#00e5a0"} rx="3" opacity=".9"/>
          <text x={(x+bw/2)+"%"} y={h-3} textAnchor="middle" fill="#506070" fontSize="9" fontFamily="Outfit,sans-serif">{d.lbl}</text>
        </g>);
      })}
    </svg>
  );
}
function LineSvg({data,h=120,col}){
  col=col||"#00e5a0";
  if(!data||data.length<2)return null;
  const vals=data.map(d=>d.v),mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1;
  const W=400,px=16,top=18,bot=22;
  const cx=i=>px+(i/(data.length-1))*(W-px*2);
  const cy=v=>top+(1-(v-mn)/range)*(h-top-bot);
  const pts=data.map((d,i)=>cx(i)+","+cy(d.v)).join(" ");
  const fpt=data.map((d,i)=>cx(i)+","+(h-bot)).join(" ")+" "+[...data].reverse().map((d,i)=>cx(data.length-1-i)+","+cy(d.v)).join(" ");
  const gid="g"+col.replace(/[^a-z0-9]/gi,"");
  return(
    <svg width="100%" viewBox={"0 0 "+W+" "+h} style={{display:"block"}} preserveAspectRatio="none">
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity=".2"/><stop offset="100%" stopColor={col} stopOpacity="0"/></linearGradient></defs>
      <polyline points={fpt} fill={"url(#"+gid+")"}/>
      <polyline points={pts} fill="none" stroke={col} strokeWidth="2.5" strokeLinejoin="round"/>
      {data.map((d,i)=>(<g key={i}>
        <circle cx={cx(i)} cy={cy(d.v)} r="4" fill={col}/>
        <text x={cx(i)} y={h-4} textAnchor="middle" fill="#506070" fontSize="9" fontFamily="Outfit,sans-serif">{d.lbl}</text>
        {d.v>0&&<text x={cx(i)} y={cy(d.v)-9} textAnchor="middle" fill={col} fontSize="9" fontFamily="JetBrains Mono,monospace" fontWeight="700">{d.v}</text>}
      </g>))}
    </svg>
  );
}
function HBarSvg({data}){

function SettingsPanel({cfg,customEx,progs,onSave,onClose,onDeleteCustomEx,onRestorePreset}){
  const [bw,setBw]=useState(cfg.bw||83);
  const [theme,setTheme]=useState(cfg.theme||"dark");
  const [bwDate,setBwDate]=useState(new Date().toISOString().split("T")[0]);
  const [bwVal,setBwVal]=useState("");
  const [bwlog,setBwlog]=useState(cfg.bwlog||[]);
  const [importMsg,setImportMsg]=useState(null);
  function addBw(){if(!bwVal)return;const upd=[...bwlog.filter(e=>e.d!==bwDate),{d:bwDate,w:parseFloat(bwVal)}].sort((a,b)=>a.d<b.d?-1:1);setBwlog(upd);setBwVal("");}
  function exportJSON(){
    try{
      const payload={
        version:6,
        exportedAt:new Date().toISOString(),
        sessions:lsG(SK)||[],
        programs:lsG(PK)||[],
        customEx:lsG(XK)||[],
        cfg:lsG(CK)||{},
      };
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      const d=new Date().toISOString().split("T")[0];
      a.download=`perftrack_backup_${d}.json`;
      a.click();URL.revokeObjectURL(url);
    }catch(e){alert("Erreur export: "+e.message);}
  }
  function importJSON(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.sessions||!Array.isArray(data.sessions))throw new Error("Fichier invalide");
        const count=data.sessions.length;
        lsS(SK,data.sessions);
        if(data.programs)lsS(PK,data.programs);
        if(data.customEx)lsS(XK,data.customEx);
        if(data.cfg)lsS(CK,data.cfg);
        setImportMsg({ok:true,txt:`✓ ${count} séances restaurées. Rechargez la page.`});
        setTimeout(()=>window.location.reload(),1500);
      }catch(err){
        setImportMsg({ok:false,txt:"✗ Fichier invalide : "+err.message});
      }
    };
    reader.readAsText(file);
    e.target.value="";
  }
  const exportCSV=()=>{
    try{
      const s=lsG(SK)||[];
      const rows=[["Date","Séance","Exercice","Groupe","Série","Poids(kg)","Reps","Volume(kg)","RPE"]];
      s.forEach(sess=>{const nm=sessTitle(sess,progs);sess.ex.forEach(e=>{e.sets.forEach((set,i)=>{rows.push([sess.date,nm,e.nm,e.mu,i+1,set.w||0,set.r||0,(set.w||0)*(set.r||0),set.rpe||""])});});});
      const csv="\uFEFF"+rows.map(r=>r.join(";")).join("\n");
      const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
      const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="perftrack.csv";a.click();URL.revokeObjectURL(url);
    }catch(e){alert("Erreur: "+e.message);}
  };
  const bwLineData=(bwlog||[]).slice(-10).map(e=>({lbl:fmt(e.d),v:e.w}));
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:400,overflowY:"auto"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"var(--s1)",maxWidth:480,margin:"20px auto",borderRadius:20,padding:"22px 18px",border:"1px solid var(--bd)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <div className="R" style={{fontSize:21}}>PARAMÈTRES</div>
          <button onClick={onClose} style={{background:"var(--s2)",border:"none",color:"var(--t2)",borderRadius:8,padding:"5px 13px",fontSize:13}}>✕</button>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:"var(--t3)",letterSpacing:".08em",marginBottom:8,textTransform:"uppercase"}}>Thème</div>
          <div style={{display:"flex",gap:8}}>
            {["dark","light"].map(th=>(
              <button key={th} onClick={()=>setTheme(th)} style={{flex:1,background:theme===th?"#00e5a022":"var(--s2)",color:theme===th?"#00e5a0":"var(--t2)",border:"1px solid "+(theme===th?"#00e5a044":"var(--bd)"),borderRadius:10,padding:"10px",fontSize:13,fontWeight:600}}>
                {th==="dark"?"🌙 Sombre":"☀️ Clair"}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:"var(--t3)",letterSpacing:".08em",marginBottom:8,textTransform:"uppercase"}}>Poids de corps</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input type="number" inputMode="decimal" step=".5" value={bw} onChange={e=>setBw(e.target.value)} style={{flex:1,background:"var(--s2)",border:"1px solid var(--bd2)",borderRadius:10,padding:"10px 13px",color:"var(--t1)",fontSize:16,fontFamily:"JetBrains Mono,monospace",fontWeight:700}}/>
            <span style={{fontSize:13,color:"var(--t3)"}}>kg</span>
          </div>
        </div>
        <div style={{marginBottom:18}}>

function weekStart(d){
  const dt=new Date(d);dt.setHours(0,0,0,0);
  const day=dt.getDay()||7;
  dt.setDate(dt.getDate()-day+1);
  return dt.toISOString().split("T")[0];
}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().split("T")[0];}
function diffDays(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function fmtShort(d){return new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short"});}

function computeMetrics(sessions,bw=83,progs=[]){
  if(!sessions.length)return null;

  const sorted=[...sessions].sort((a,b)=>a.date>b.date?1:-1);
  const today=new Date().toISOString().split("T")[0];

  
  const volByDay={};
  sorted.forEach(s=>{volByDay[s.date]=(volByDay[s.date]||0)+sessVol(s,bw);});

  
  const volByWeek={};
  sorted.forEach(s=>{
    const wk=weekStart(s.date);
    if(!volByWeek[wk])volByWeek[wk]={vol:0,sessions:0,rpe:[]};
    volByWeek[wk].vol+=sessVol(s,bw);
    volByWeek[wk].sessions++;
    s.ex.forEach(e=>e.sets.forEach(set=>{if(set.rpe)volByWeek[wk].rpe.push(set.rpe);}));
  });

  
  const gridWeeks=[];
  let wk=weekStart(addDays(today,-7*7));
  for(let i=0;i<8;i++){
    const data=volByWeek[wk]||{vol:0,sessions:0};
    gridWeeks.push({wk,vol:data.vol,sessions:data.sessions});
    wk=addDays(wk,7);
  }

  
  const allWeekKeys=Object.keys(volByWeek).sort();
  let streak=0,streakMax=0,cur=0;
  // Walk backwards from current week
  const curWk=weekStart(today);
  let checkWk=curWk;
  for(let i=0;i<52;i++){
    const data=volByWeek[checkWk];
    if(data&&data.sessions>=2){cur++;if(cur>streakMax)streakMax=cur;}
    else{if(i===0)cur=0;else break;}
    checkWk=addDays(checkWk,-7);
  }
  streak=cur;

  
  const thisWkData=volByWeek[weekStart(today)]||{sessions:0,vol:0};
  const lastWkData=volByWeek[weekStart(addDays(today,-7))]||{sessions:0,vol:0};

  
  const acute7=sorted.filter(s=>diffDays(s.date,today)<=7).reduce((a,s)=>a+sessVol(s,bw),0);
  const chronic28=sorted.filter(s=>diffDays(s.date,today)<=28).reduce((a,s)=>a+sessVol(s,bw),0)/4;
  const accRatio=chronic28>0?Math.round((acute7/chronic28)*100)/100:null;

  
  const last8Weeks=gridWeeks.slice(-8);

  
  const exIds=[...new Set(sorted.flatMap(s=>s.ex.filter(e=>e.sets.some(x=>x.w>0)).map(e=>e.id)))];
  const exComparisons=exIds.map(id=>{
    const getName=()=>{for(const t of [...Object.values(TPL),...progs])for(const e of(t.ex||[]))if(e.id===id)return e.nm;for(const arr of Object.values(BANK))for(const e of arr)if(e.id===id)return e.nm;return id;};
    const mu=(()=>{const s=sorted.find(s=>s.ex.some(e=>e.id===id));return s?.ex.find(e=>e.id===id)?.mu||"";})();
    const getMaxW=s=>Math.max(0,...s.ex.filter(e=>e.id===id).flatMap(e=>e.sets.map(x=>x.w||0)));
    const now=getMaxW(sorted[sorted.length-1])||0;
    const d30=sorted.find(s=>diffDays(s.date,today)<=30&&diffDays(s.date,today)>=5&&s.ex.some(e=>e.id===id));
    const d90=sorted.find(s=>diffDays(s.date,today)<=91&&diffDays(s.date,today)>=25&&s.ex.some(e=>e.id===id));
    const w30=d30?getMaxW(d30):null;
    const w90=d90?getMaxW(d90):null;
    return{id,nm:getName(),mu,now,w30,w90,diff30:w30?now-w30:null,diff90:w90?now-w90:null};
  }).filter(e=>e.now>0&&(e.diff30!==null||e.diff90!==null));

  
  const plateaux=exIds.map(id=>{
    const getName=()=>{for(const t of [...Object.values(TPL),...progs])for(const e of(t.ex||[]))if(e.id===id)return e.nm;for(const arr of Object.values(BANK))for(const e of arr)if(e.id===id)return e.nm;return id;};
    const recent=sorted.filter(s=>s.ex.some(e=>e.id===id)).slice(-4);
    if(recent.length<3)return null;
    const weights=recent.map(s=>Math.max(0,...s.ex.filter(e=>e.id===id).flatMap(e=>e.sets.map(x=>x.w||0))));
    const reps=recent.map(s=>Math.max(0,...s.ex.filter(e=>e.id===id).flatMap(e=>e.sets.map(x=>x.r||0))));
    const maxW=Math.max(...weights),minW=Math.min(...weights.filter(w=>w>0));
    const maxR=Math.max(...reps),minR=Math.min(...reps.filter(r=>r>0));
    if(weights.every(w=>w>0)&&maxW-minW<=2.5&&maxR-minR<=1&&recent.length>=3){
      return{id,nm:getName(),sessions:recent.length,maxW,maxR,since:recent[0].date};
    }
    return null;
  }).filter(Boolean);

  
  const rpeByEx={};
  sorted.forEach(s=>{
    s.ex.forEach(e=>{
      const rpes=e.sets.filter(x=>x.rpe).map(x=>x.rpe);
      if(!rpes.length)return;
      if(!rpeByEx[e.id])rpeByEx[e.id]={nm:e.nm,data:[]};
      rpeByEx[e.id].data.push({date:s.date,avgRpe:rpes.reduce((a,b)=>a+b,0)/rpes.length});
    });
  });
  const rpeCharts=Object.values(rpeByEx).filter(e=>e.data.length>=2).slice(0,6);

  
  const recordsMap={};
  sorted.forEach(s=>{s.ex.forEach(e=>{e.sets.forEach(set=>{
    if(set.w>0){
      const prev=recordsMap[e.id];
      const rm=oneRM(set.w,set.r)||0;
      if(!prev||set.w>prev.bw||(set.w===prev.bw&&(set.r||0)>(prev.br||0))){
        recordsMap[e.id]={id:e.id,nm:e.nm,mu:e.mu,bw:set.w,br:set.r||0,rm:Math.max(rm,prev?.rm||0),date:s.date};
      }else if(rm>prev.rm){recordsMap[e.id]={...prev,rm,date:s.date};}
    }
  });});});
  const records=Object.values(recordsMap).sort((a,b)=>b.bw-a.bw);

  
  const lastCompletedWk=weekStart(addDays(today,-7));
  const recapSessions=sorted.filter(s=>s.date>=lastCompletedWk&&s.date<weekStart(today));
  const recapPRs=[];
  const recapBests={};
  // Find PRs this week
  if(recapSessions.length){
    const beforeWeek=sorted.filter(s=>s.date<lastCompletedWk);
    recapSessions.forEach(s=>{
      s.ex.forEach(e=>{
        e.sets.forEach(set=>{
          if(set.w>0){
            const prevMax=Math.max(0,...beforeWeek.flatMap(ps=>ps.ex.filter(pe=>pe.id===e.id).flatMap(pe=>pe.sets.map(ps2=>ps2.w||0))));
            if(prevMax>0&&set.w>prevMax)recapPRs.push({nm:e.nm,w:set.w,prev:prevMax});
          }
        });
      });
    });
  }
  const recapVol=recapSessions.reduce((a,s)=>a+sessVol(s,bw),0);
  const prevWkData=volByWeek[weekStart(addDays(lastCompletedWk,-7))]||{vol:0,sessions:0};

  return{
    sorted,today,
    gridWeeks,streak,streakMax,
    thisWkData,lastWkData,
    accRatio,acute7,chronic28,
    last8Weeks,
    exComparisons,
    plateaux,
    rpeCharts,
    records,
    recap:{sessions:recapSessions,vol:recapVol,prs:[...new Set(recapPRs.map(p=>p.nm))].slice(0,5),prevVol:prevWkData.vol,prevSessions:prevWkData.sessions},
    totalSessions:sessions.length,
    totalVol:sessions.reduce((a,s)=>a+sessVol(s,bw),0),
    maxWt:(()=>{let m=0;sessions.forEach(s=>s.ex.forEach(e=>e.sets.forEach(x=>{if((x.w||0)>m)m=x.w;})));return m;})(),
    avgDur:sessions.length?Math.round(sessions.reduce((a,s)=>a+s.dur,0)/60/sessions.length):0,
  };
}

function HeatMap({gridWeeks,accentCol}){
  const maxVol=Math.max(...gridWeeks.map(w=>w.vol),1);
  const DAYS=["L","M","M","J","V","S","D"];
  return(
    <div>
      <div style={{display:"flex",gap:4,marginBottom:6}}>
        {DAYS.map((d,i)=>(
          <div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:"var(--t3)",fontWeight:600}}>{d}</div>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {gridWeeks.map((wk,wi)=>{
          const opacity=wk.vol>0?Math.min(1,0.2+(wk.vol/maxVol)*0.8):0;
          const cells=Array(7).fill(0);
          return(
            <div key={wi} style={{display:"flex",gap:4,alignItems:"center"}}>
              {cells.map((_,di)=>(
                <div key={di} style={{
                  flex:1,height:24,borderRadius:4,
                  background:wk.sessions>0&&di<5?`rgba(${hexToRgb(accentCol)},${opacity})`:"var(--s2)",
                  border:"1px solid "+(wk.sessions>0&&di<5?accentCol+"33":"var(--bd)"),
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:8,color:opacity>0.5?"#000":"var(--t3)",fontWeight:700,
                }}>{di===0&&wk.sessions>0?wk.sessions:""}</div>
              ))}
              <div style={{width:32,textAlign:"right",fontSize:8,color:"var(--t3)"}}>{fmtShort(wk.wk).split(" ")[0]}/{fmtShort(wk.wk).split(" ")[1]}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`${r},${g},${b}`;
}

function FormeBar({accRatio}){
  if(!accRatio)return<div style={{fontSize:11,color:"var(--t3)"}}>Données insuffisantes (4 semaines min.)</div>;
  const pct=Math.min(100,Math.max(0,(accRatio/2)*100));
  let status,col,desc;
  if(accRatio<0.8){status="RÉCUPÉRATION";col="#38bdf8";desc="Charge faible · Bon moment pour récupérer";}
  else if(accRatio<=1.3){status="OPTIMAL";col="#00e5a0";desc="Zone de progression idéale";}
  else if(accRatio<=1.5){status="CHARGE ÉLEVÉE";col="#f97316";desc="Attention au surmenage · Récup suffisante ?";}
  else{status="SURMENAGE";col="#f87171";desc="Charge trop importante · Risque de blessure";}
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div>
          <span className="M" style={{fontSize:24,fontWeight:700,color:col}}>{accRatio.toFixed(2)}</span>
          <span style={{fontSize:11,color:"var(--t3)",marginLeft:6}}>AC:CC</span>
        </div>
        <div style={{background:col+"22",color:col,border:"1px solid "+col+"44",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:700,fontFamily:"Russo One,sans-serif"}}>{status}</div>
      </div>
      <div style={{height:12,background:"linear-gradient(90deg,#38bdf8 0%,#00e5a0 40%,#f97316 70%,#f87171 100%)",borderRadius:6,position:"relative",marginBottom:6}}>
        <div style={{position:"absolute",top:"50%",transform:"translate(-50%,-50%)",left:pct+"%",width:14,height:14,borderRadius:"50%",background:"#fff",border:"2px solid "+col,boxShadow:"0 2px 8px rgba(0,0,0,.4)"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"var(--t3)"}}>
        <span>Récup</span><span>Optimal</span><span>Surcharge</span>
      </div>
      <div style={{fontSize:11,color:"var(--t2)",marginTop:8}}>{desc}</div>
      <div style={{display:"flex",gap:16,marginTop:8}}>
        <div><div style={{fontSize:9,color:"var(--t3)"}}>CHARGE 7 JOURS</div><div className="M" style={{fontSize:13,fontWeight:700,color:col}}>{Math.round(accRatio*100>0?accRatio*100:0)/100} k·kg</div></div>
        <div><div style={{fontSize:9,color:"var(--t3)"}}>MOY. 28 JOURS</div><div className="M" style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>réf.</div></div>
      </div>
    </div>
  );
}

function WeeklyRecap({recap}){
  const volDiff=recap.prevVol>0?Math.round((recap.vol-recap.prevVol)/recap.prevVol*100):null;
  const sessDiff=recap.sessions.length-recap.prevSessions;
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[
          {lbl:"SÉANCES",val:recap.sessions.length,diff:sessDiff>0?"+"+sessDiff:sessDiff<0?""+sessDiff:null,col:"#00e5a0"},
          {lbl:"VOLUME",val:recap.vol>0?Math.round(recap.vol/100)/10+"k":"—",diff:volDiff!==null?(volDiff>0?"+"+volDiff+"%":volDiff+"%"):null,col:"#f97316"},
          {lbl:"PR",val:recap.prs.length,col:"#f87171"},
        ].map(s=>(
          <div key={s.lbl} style={{background:"var(--s2)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
            <div className="M" style={{fontSize:18,fontWeight:700,color:s.col}}>{s.val}</div>
            {s.diff&&<div style={{fontSize:10,color:parseInt(s.diff)>0?"#00e5a0":"#f87171",fontWeight:700}}>{s.diff}</div>}
            <div style={{fontSize:9,color:"var(--t3)",marginTop:2}}>{s.lbl}</div>
          </div>
        ))}
      </div>
      {recap.prs.length>0&&(
        <div style={{background:"rgba(248,113,113,.08)",border:"1px solid #f8717133",borderRadius:10,padding:"10px 12px"}}>
          <div style={{fontSize:10,color:"#f87171",fontWeight:700,marginBottom:6,letterSpacing:".06em"}}>🏆 RECORDS BATTUS CETTE SEMAINE</div>
          {recap.prs.map((nm,i)=>(
            <div key={i} style={{fontSize:12,color:"var(--t1)",fontWeight:600,padding:"2px 0"}}>· {nm}</div>
          ))}
        </div>
      )}
      {recap.sessions.length===0&&(
        <div style={{fontSize:12,color:"var(--t3)",textAlign:"center",padding:"8px 0"}}>Aucune séance la semaine dernière.</div>
      )}
    </div>
  );
}

function RPECharts({rpeCharts}){
  if(!rpeCharts.length)return<div style={{fontSize:11,color:"var(--t3)"}}>Commence à noter le RPE de tes séries pour voir la tendance de fatigue.</div>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {rpeCharts.map(ex=>{
        const vals=ex.data.map(d=>d.avgRpe);
        const max=3,min=1,range=max-min;
        const W=400,px=12,top=12,bot=16;
        const n=vals.length;
        const cx=i=>n>1?px+(i/(n-1))*(W-px*2):W/2;
        const cy=v=>top+(1-(v-min)/range)*(60-top-bot);
        const pts=vals.map((v,i)=>cx(i)+","+cy(v)).join(" ");
        const trend=n>1?(vals[n-1]-vals[0])>0.3?"📈 Fatigue en hausse":vals[n-1]-vals[0]<-0.3?"📉 Récupération bonne":"➡ Stable":null;
        const lastRpe=vals[n-1];
        const rpeCol=lastRpe<1.7?"#00e5a0":lastRpe<2.3?"#f97316":"#f87171";
        return(
          <div key={ex.nm} style={{background:"var(--s2)",borderRadius:10,padding:"10px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{fontSize:12,fontWeight:700}}>{ex.nm}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {trend&&<span style={{fontSize:10,color:"var(--t3)"}}>{trend}</span>}
                <span style={{fontSize:18}}>{["","😌","😤","💀"][Math.round(lastRpe)]||""}</span>
              </div>
            </div>
            <svg width="100%" viewBox={"0 0 "+W+" 60"} style={{display:"block"}} preserveAspectRatio="none">
              <line x1={px} y1={cy(1)} x2={W-px} y2={cy(1)} stroke="var(--bd)" strokeWidth="1" strokeDasharray="3,3"/>
              <line x1={px} y1={cy(2)} x2={W-px} y2={cy(2)} stroke="var(--bd)" strokeWidth="1" strokeDasharray="3,3"/>
              <line x1={px} y1={cy(3)} x2={W-px} y2={cy(3)} stroke="var(--bd)" strokeWidth="1" strokeDasharray="3,3"/>
              {n>1&&<polyline points={pts} fill="none" stroke={rpeCol} strokeWidth="2" strokeLinejoin="round"/>}
              {vals.map((v,i)=><circle key={i} cx={cx(i)} cy={cy(v)} r="3.5" fill={rpeCol}/>)}
            </svg>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:"var(--t3)",marginTop:2}}>
              <span>{fmtShort(ex.data[0].date)}</span><span>{fmtShort(ex.data[ex.data.length-1].date)}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* Streak helper (lightweight, for SessionSelect) */
function quickStreak(sessions){
  if(!sessions||!sessions.length)return 0;
  const today=new Date().toISOString().split("T")[0];
  const wkCount={};
  sessions.forEach(s=>{const w=weekStart(s.date);wkCount[w]=(wkCount[w]||0)+1;});
  let count=0,wk=weekStart(today);
  for(let i=0;i<52;i++){
    if((wkCount[wk]||0)>=2)count++;
    else if(i>0)break;
    wk=addDays(wk,-7);
  }
  return count;
}

/* Session Timer */
function SessionTimer({startTime,col}){
  const [e,setE]=useState(Math.round((Date.now()-startTime)/1000));
  useEffect(()=>{
    const iv=setInterval(()=>setE(Math.round((Date.now()-startTime)/1000)),1000);
    return()=>clearInterval(iv);
  },[startTime]);
  const mm=String(Math.floor(e/60)).padStart(2,"0"),ss=String(e%60).padStart(2,"0");
  return<span className="M" style={{fontSize:22,fontWeight:700,color:col}}>{mm}:{ss}</span>;
}

/* Set Row — module-level memo, bigger buttons, RPE separate row, long-press unvalidate, % 1RM */
const SetRow=memo(function SetRow({xi,si,set,bwEx,step,prevBestW,tcol,histBestRM,isActive,onUpd,onAdjW,onAdjR,onValidate,onUnvalidate,rowRef}){

  const rpeCol=["","#00e5a0","#f97316","#f87171"];

  function startPress(){
    if(!set.done)return;
    pressRef.current=setTimeout(()=>{
      onUnvalidate(xi,si);
      if(navigator.vibrate)navigator.vibrate(150);

  return(
    <div ref={rowRef} style={{marginBottom:5}}>
      {/* Main row */}
      <div style={{display:"grid",
        gridTemplateColumns:bwEx?"28px 1fr 46px":"28px 1fr 1fr 46px",

        background:set.done?"rgba(0,229,160,.08)":isActive?"var(--s2)":"transparent",
        borderRadius:10,padding:"6px 5px",
        border:"1px solid "+(set.done?"#00b07d":isActive?"var(--bd2)":"transparent"),
        transition:"background .2s,border-color .2s"}}>
        <div className="M" style={{fontSize:12,color:"var(--t3)",fontWeight:700,textAlign:"center"}}>{si+1}</div>
        {!bwEx&&(
          <div style={{display:"flex",alignItems:"center",gap:3}}>
            {mkBtn(()=>onAdjW(xi,si,-step),"−",set.done)}
            <input type="number" inputMode="decimal" step={step}
              value={set.w!=null?set.w:""} disabled={set.done}
              onChange={e=>onUpd(xi,si,"w",e.target.value)} placeholder="kg"
              style={{flex:1,background:"var(--s3)",border:"1px solid var(--bd2)",borderRadius:7,padding:"8px 2px",
                color:"var(--t1)",fontSize:15,fontFamily:"JetBrains Mono,monospace",fontWeight:700,
                textAlign:"center",minWidth:0,opacity:set.done?.5:1}}/>
            {mkBtn(()=>onAdjW(xi,si,step),"+",set.done)}
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          {mkBtn(()=>onAdjR(xi,si,-1),"−",set.done)}
          <input type="number" inputMode="numeric"
            value={set.r!=null?set.r:""} disabled={set.done}
            onChange={e=>onUpd(xi,si,"r",e.target.value)} placeholder="reps"
            style={{flex:1,background:"var(--s3)",border:"1px solid var(--bd2)",borderRadius:7,padding:"8px 2px",
              color:"var(--t1)",fontSize:15,fontFamily:"JetBrains Mono,monospace",fontWeight:700,
              textAlign:"center",minWidth:0,opacity:set.done?.5:1}}/>
          {mkBtn(()=>onAdjR(xi,si,1),"+",set.done)}
        </div>
        {/* Validate / long-press unvalidate */}
        <button
          onClick={()=>{if(!set.done)onValidate(xi,si);}}
          onTouchStart={startPress} onTouchEnd={endPress}
          onMouseDown={startPress} onMouseUp={endPress} onMouseLeave={endPress}
          title={set.done?"Maintenir pour annuler":"Valider"}
          style={{background:set.done?tcol+"33":tcol,color:set.done?tcol:"#000",
            border:set.done?"1px dashed "+tcol+"66":"none",
            borderRadius:10,height:44,width:44,fontSize:18,
            display:"flex",alignItems:"center",justifyContent:"center",
            cursor:"pointer",flexShrink:0,touchAction:"manipulation",
            transition:"background .15s"}}>
          {set.done?"✓":"›"}
        </button>
      </div>

      {/* RPE row + % 1RM — visible when active or done */}
      {(isActive||set.done)&&(
        <div style={{display:"flex",alignItems:"center",gap:5,paddingLeft:36,marginTop:3,flexWrap:"wrap"}}>
          {[1,2,3].map(v=>(
            <button key={v} onClick={()=>onUpd(xi,si,"rpe",set.rpe===v?null:v)}
              style={{
                background:set.rpe===v?rpeCol[v]+"22":"var(--s2)",
                border:"1px solid "+(set.rpe===v?rpeCol[v]+"55":"var(--bd)"),
                borderRadius:20,padding:"5px 12px",fontSize:13,cursor:"pointer",
                display:"flex",alignItems:"center",gap:5,transition:"all .15s",
                touchAction:"manipulation",
              }}>
              <span>{["","😌","😤","💀"][v]}</span>
              <span style={{fontSize:10,color:set.rpe===v?rpeCol[v]:"var(--t3)",fontWeight:600}}>{rpeLbl[v]}</span>
            </button>
          ))}
          {pct1RM&&(
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:3}}>
              <span className="M" style={{fontSize:12,fontWeight:700,
                color:pct1RM>=90?"#f87171":pct1RM>=80?"#f97316":"#00e5a0"}}>
                {pct1RM}%
              </span>
              <span style={{fontSize:9,color:"var(--t3)"}}>1RM</span>
            </div>
          )}
          {set.done&&<span style={{fontSize:9,color:"var(--t3)",marginLeft:2}}>↙ maintenir ✓ pour annuler</span>}
        </div>
      )}
      {wAlert&&<div style={{fontSize:10,color:"#f97316",padding:"2px 8px 0"}}>⚠️ Moins que la dernière fois ({prevBestW}kg)</div>}
    </div>
  );
});

/* Exercise Header */
const ExHeader=memo(function ExHeader({ex,xi,isOpen,onToggle,tcol,stepVal,onStepChange,expandStep,onExpandStep,onSkipEx}){
  const STEPS=[0.5,1,2.5,5];
  const exDone=ex.sets.every(s=>s.done||s.skipped);
  const doneCount=ex.sets.filter(s=>s.done).length;
  const curRM=bestRM(ex);
  return(
    <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",
      cursor:onToggle?"pointer":"default",touchAction:"manipulation"}}
      onClick={onToggle||undefined}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
          {(exDone||ex.skipped)&&<span style={{color:ex.skipped?"var(--re)":tcol,fontSize:12}}>{ex.skipped?"⛔":"✓"}</span>}
          <div style={{fontSize:14,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ex.nm}</div>
          <span style={{background:(MU_COL[ex.mu]||"#888")+"22",color:MU_COL[ex.mu]||"#888",fontSize:9,padding:"1px 5px",borderRadius:3,fontWeight:700,flexShrink:0}}>{ex.mu}</span>
          {curRM>0&&<span className="M" style={{fontSize:9,color:"var(--t3)",background:"var(--s2)",padding:"1px 5px",borderRadius:3,flexShrink:0}}>~{curRM}kg</span>}
        </div>
        <div style={{fontSize:10,color:"var(--t3)",marginTop:1,display:"flex",gap:5,flexWrap:"wrap"}}>
          <span>{ex.ns}×{ex.rp}</span>
          {(ex.rt||0)>0&&<span>· ⏱{fmtD(ex.rt)}</span>}
        </div>
      </div>
      {!ex.bw&&(
        <div style={{position:"relative"}}>
          <button onClick={e=>{e.stopPropagation();onExpandStep(expandStep===xi?null:xi);}}
            style={{background:"var(--s2)",border:"1px solid var(--bd)",color:"var(--t2)",
              borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:700,touchAction:"manipulation"}}>
            ±{stepVal}kg
          </button>
          {expandStep===xi&&(
            <div style={{position:"absolute",right:0,top:"110%",background:"var(--s1)",
              border:"1px solid var(--bd)",borderRadius:10,padding:"6px",
              display:"flex",gap:4,zIndex:20,boxShadow:"0 4px 16px rgba(0,0,0,.4)"}}>
              {STEPS.map(s=>(
                <button key={s} onClick={e=>{e.stopPropagation();onStepChange(xi,s);}}
                  style={{background:stepVal===s?tcol+"33":"var(--s2)",
                    color:stepVal===s?tcol:"var(--t2)",
                    border:"1px solid "+(stepVal===s?tcol+"44":"var(--bd)"),
                    borderRadius:7,padding:"7px 10px",fontSize:12,fontWeight:700,
                    touchAction:"manipulation"}}>
                  {s}
                </button>
              ))}
            </div>
          )}
        </div>
      )}
      {!exDone&&!ex.skipped&&(
        <button onClick={e=>{e.stopPropagation();onSkipEx(xi);}} title="Passer cet exercice"
          style={{background:"var(--s2)",border:"1px solid var(--bd)",color:"var(--re)",
            borderRadius:6,padding:"5px 10px",fontSize:11,flexShrink:0,
            touchAction:"manipulation"}}>⛔</button>
      )}
      <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
        <span className="M" style={{fontSize:11,color:tcol,fontWeight:700}}>{doneCount}/{ex.sets.length}</span>
        {onToggle&&<span style={{fontSize:16,color:"var(--t3)",display:"inline-block",
          transform:isOpen?"rotate(90deg)":"none",transition:"transform .2s"}}>›</span>}
      </div>
    </div>
  );
});

/* Active Session */
const ActiveSession=memo(function ActiveSession({session,sessions,cfg,progs,onUpdateSet,onFinish,onTimer,onPR,onSkipEx}){
  const t=getTPL(session.tpl,progs)||{lbl:"LIBRE",col:"#64748b"};
  const [compact,setCompact]=useState(()=>{try{return localStorage.getItem("pt_compact")==="1"}catch{return false}});
  const [openEx,setOpenEx]=useState(0);
  const [steps,setSteps]=useState({});
  const [expandStep,setExpandStep]=useState(null);
  const inputRefs=useRef({});
  const rowRefs=useRef({});
  const swipeX=useRef(null);
  const wlRef=useRef(null);

  useEffect(()=>{
    if(navigator.wakeLock)navigator.wakeLock.request("screen").then(wl=>{wlRef.current=wl;}).catch(()=>{});
    return()=>{if(wlRef.current)wlRef.current.release().catch(()=>{});};
  },[]);

  const toggleCompact=useCallback(v=>{
    setCompact(v);try{localStorage.setItem("pt_compact",v?"1":"0");}catch{}
  },[]);

  const getStep=useCallback(exId=>steps[exId]||2.5,[steps]);

  const handleStepChange=useCallback((xi,s)=>{
    const exId=session.ex[xi]?.id;
    if(exId)setSteps(p=>({...p,[exId]:s}));
    setExpandStep(null);
  },[session.ex]);

  const getPrev=useCallback(xid=>{
    const exNm=session.ex.find(e=>e.id===xid)?.nm||"";
    const na=exNm.toLowerCase().trim();
    function match(a,b){
      if(!a||!b)return false;
      const nb=b.toLowerCase().trim();
      if(na===nb)return true;
      if(na.length>=4&&(nb.includes(na)||na.includes(nb)))return true;
      const wa=na.split(/\s+/).filter(w=>w.length>=4);
      const wb=new Set(nb.split(/\s+/).filter(w=>w.length>=4));
      return wa.some(w=>wb.has(w));
    }
    for(const s of sessions){
      if(s.id===session.id)continue;
      const found=s.ex.find(e=>e.id===xid||match(exNm,e.nm));
      if(found&&found.sets.some(s2=>s2.w>0||s2.r>0))return found;
    }
    return null;
  },[sessions,session]);

  const getHistBestRM=useCallback(exId=>{
    const allRMs=sessions.flatMap(s=>s.ex.filter(e=>e.id===exId)
      .flatMap(e=>e.sets.map(s2=>oneRM(s2.w,s2.r)||0)));
    return allRMs.length?Math.max(0,...allRMs):0;
  },[sessions]);

  const adjW=useCallback((xi,si,d)=>{
    const c=session.ex[xi].sets[si].w||0;
    onUpdateSet(xi,si,"w",String(Math.max(0,Math.round((c+d)*4)/4)));
  },[session.ex,onUpdateSet]);

  const adjR=useCallback((xi,si,d)=>{
    const c=session.ex[xi].sets[si].r||0;
    onUpdateSet(xi,si,"r",String(Math.max(0,c+d)));
  },[session.ex,onUpdateSet]);

  const unvalidateSet=useCallback((xi,si)=>{
    onUpdateSet(xi,si,"done",false);
    onUpdateSet(xi,si,"doneAt",null);
  },[onUpdateSet]);

  const copyLastSet=useCallback(xi=>{
    const ex=session.ex[xi];
    const last=[...ex.sets].reverse().find(s=>s.done);
    if(!last)return;
    const nxt=ex.sets.findIndex(s=>!s.done);
    if(nxt<0)return;
    if(last.w!=null)onUpdateSet(xi,nxt,"w",last.w);
    if(last.r!=null)onUpdateSet(xi,nxt,"r",last.r);
  },[session.ex,onUpdateSet]);

  const validateSet=useCallback((xi,si)=>{
    const ex=session.ex[xi];
    const set=ex.sets[si];
    const ispr=!ex.bw&&checkPR(sessions,ex.id,set.w||0);
    onUpdateSet(xi,si,"done",true);
    onUpdateSet(xi,si,"doneAt",Date.now());
    if(navigator.vibrate)navigator.vibrate(50);
    if(ispr)onPR(ex.nm+" — "+set.w+"kg");
    // Find next exercise for timer
    let nextEx=null,nextPrevW=0;
    outer:for(let nxi=xi;nxi<session.ex.length;nxi++){
      const startSi=nxi===xi?si+1:0;
      for(let nsi=startSi;nsi<session.ex[nxi].sets.length;nsi++){
        if(!session.ex[nxi].sets[nsi].done){
          if(nxi!==xi){
            nextEx=session.ex[nxi];
            const np=sessions.find(s=>s.tpl===session.tpl&&s.id!==session.id);
            nextPrevW=np?Math.max(0,...(np.ex.find(e=>e.id===nextEx.id)?.sets.map(s=>s.w||0)||[0])):0;
          }
          break outer;
        }
      }
    }
    const rt=ex.rt||0;
    if(rt>0)onTimer(rt,ex.nm,nextEx,nextPrevW);
    // Auto-scroll to next active set
    setTimeout(()=>{
      for(let nsi=si+1;nsi<ex.sets.length;nsi++){
        if(!ex.sets[nsi].done){
          rowRefs.current[xi+"_"+nsi]?.scrollIntoView({behavior:"smooth",block:"nearest"});
          const key=ex.bw?"r_"+xi+"_"+nsi:"w_"+xi+"_"+nsi;
          inputRefs.current[key]?.focus();
          return;
        }
      }
      // Move to next exercise
      if(!compact){
        for(let nxi=xi+1;nxi<session.ex.length;nxi++){
          if(!session.ex[nxi].skipped){
            setOpenEx(nxi);
            setTimeout(()=>rowRefs.current[nxi+"_0"]?.scrollIntoView({behavior:"smooth",block:"start"}),150);
            return;
          }
        }
      }
    },150);
  },[session,sessions,onUpdateSet,onTimer,onPR,compact]);

  function onTouchStart(e){swipeX.current=e.touches[0].clientX;}
  function onTouchEnd(e){
    if(swipeX.current===null)return;
    const diff=swipeX.current-e.changedTouches[0].clientX;
    if(Math.abs(diff)>55){
      if(diff>0&&openEx<session.ex.length-1)setOpenEx(o=>o+1);
      else if(diff<0&&openEx>0)setOpenEx(o=>o-1);
    }
    swipeX.current=null;
  }

  const allSets=session.ex.flatMap(e=>e.sets);
  const prog=allSets.length?allSets.filter(s=>s.done).length/allSets.length:0;

  const COL_H=bwEx=>(
    <div style={{display:"grid",
      gridTemplateColumns:bwEx?"28px 1fr 46px":"28px 1fr 1fr 46px",
      gap:4,padding:"0 5px 4px"}}>
      <div style={{fontSize:9,color:"var(--t3)"}}>S</div>
      {!bwEx&&<div style={{fontSize:9,color:"var(--t3)",textAlign:"center"}}>KG</div>}
      <div style={{fontSize:9,color:"var(--t3)",textAlign:"center"}}>REPS</div>
      <div/>
    </div>
  );

  return(
    <div style={{paddingBottom:120}}>
      <div style={{position:"sticky",top:0,zIndex:10,background:"var(--bg)",
        borderBottom:"1px solid var(--bd)",padding:"9px 16px",
        display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <Tag lbl={t.lbl} col={t.col} sm/>
          <div className="R" style={{fontSize:13,marginTop:2}}>{sessTitle(session,progs)}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",background:"var(--s2)",borderRadius:8,border:"1px solid var(--bd)",overflow:"hidden"}}>
            {[{v:false,ic:"☰"},{v:true,ic:"⊞"}].map(({v,ic})=>(
              <button key={String(v)} onClick={()=>toggleCompact(v)}
                style={{background:compact===v?t.col+"33":"transparent",
                  color:compact===v?t.col:"var(--t3)",border:"none",
                  padding:"6px 12px",fontSize:14,cursor:"pointer",
                  touchAction:"manipulation"}}>
                {ic}
              </button>
            ))}
          </div>
          <SessionTimer startTime={session.startTime} col={t.col}/>
        </div>
      </div>
      <div style={{height:3,background:"var(--bd)"}}>
        <div style={{height:"100%",background:t.col,transition:"width .5s",width:(prog*100)+"%"}}/>
      </div>

      <div style={{padding:"8px 14px",display:"flex",flexDirection:"column",gap:compact?5:7}}
        onTouchStart={compact?undefined:onTouchStart}
        onTouchEnd={compact?undefined:onTouchEnd}>
        {session.ex.map((ex,xi)=>{
          const prev=getPrev(ex.id);
          const prevBestW=prev?Math.max(0,...prev.sets.map(s=>s.w||0)):0;
          const stepVal=getStep(ex.id);
          const histBestRM=getHistBestRM(ex.id);
          const isOpen=!compact&&openEx===xi;
          const showSets=compact||isOpen;
          return(
            <div key={ex.id+"_"+xi}
              style={{background:"var(--s1)",borderRadius:compact?11:14,overflow:"hidden",
                border:"1px solid "+(ex.sets.every(s=>s.done||s.skipped)?t.col+"44":"var(--bd)"),
                transition:"border-color .3s"}}>
              <ExHeader
                ex={ex} xi={xi} isOpen={isOpen}
                onToggle={compact?null:()=>setOpenEx(isOpen?-1:xi)}
                tcol={t.col} stepVal={stepVal}
                onStepChange={handleStepChange}
                expandStep={expandStep} onExpandStep={setExpandStep}
                onSkipEx={onSkipEx}
              />
              {showSets&&!ex.skipped&&(
                <div style={{padding:"0 12px 10px"}} className={compact?"":"su"}>
                  {!compact&&!ex.bw&&prev&&(
                    <div style={{background:"var(--s2)",borderRadius:8,padding:"7px 11px",marginBottom:8,display:"flex",gap:14,flexWrap:"wrap"}}>
                      <div><div style={{fontSize:9,color:"var(--t3)"}}>PRÉC.</div>
                        <div className="M" style={{fontSize:11,color:"var(--t2)",fontWeight:600}}>
                          {bestSet(prev).w>0?bestSet(prev).w+"kg×"+bestSet(prev).r:Math.max(...prev.sets.map(s=>s.r||0))+" reps"}
                        </div>
                      </div>
                      {(()=>{const sg=getSugg(sessions,session.tpl,ex.id);return sg?(
                        <div><div style={{fontSize:9,color:"var(--t3)"}}>OBJECTIF</div>
                          <div className="M" style={{fontSize:11,color:sg.up?"var(--gr)":"var(--t2)",fontWeight:700}}>{sg.w}kg {sg.up&&"↑"}</div>
                        </div>
                      ):null;})()}
                    </div>
                  )}
                  {COL_H(ex.bw)}
                  {ex.sets.map((set,si)=>{
                    const isAct=!set.done&&ex.sets.slice(0,si).every(s=>s.done||s.skipped);
                    return(
                      <SetRow key={si}
                        xi={xi} si={si} set={set} bwEx={ex.bw}
                        step={stepVal} prevBestW={prevBestW}
                        tcol={t.col} histBestRM={histBestRM}
                        isActive={isAct}
                        rowRef={el=>rowRefs.current[xi+"_"+si]=el}
                        onUpd={onUpdateSet}
                        onAdjW={adjW} onAdjR={adjR}
                        onValidate={validateSet}
                        onUnvalidate={unvalidateSet}
                      />
                    );
                  })}
                  {ex.sets.some(s=>s.done)&&ex.sets.some(s=>!s.done)&&(
                    <button onClick={()=>copyLastSet(xi)}
                      style={{background:"var(--s2)",border:"1px solid var(--bd)",color:"var(--t2)",
                        borderRadius:7,padding:"6px 12px",fontSize:11,
                        display:"flex",alignItems:"center",gap:4,marginTop:3,
                        touchAction:"manipulation"}}>
                      ⎘ Copier dernier set
                    </button>
                  )}
                </div>
              )}
              {showSets&&ex.skipped&&(
                <div style={{padding:"6px 14px 10px",fontSize:11,color:"var(--re)",opacity:.7}}>Exercice passé</div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{padding:"0 14px"}}>
        <button onClick={onFinish}
          style={{width:"100%",background:prog>=1?t.col:"var(--s2)",
            color:prog>=1?"#000":"var(--t2)",
            border:"1px solid "+(prog>=1?t.col:"var(--bd)"),
            borderRadius:14,padding:"16px",fontSize:15,
            fontFamily:"Russo One,sans-serif",letterSpacing:".05em",
            transition:"background .3s,color .3s",touchAction:"manipulation"}}>
          {prog>=1?"✓ TERMINER LA SÉANCE":"TERMINER (incomplet)"}
        </button>
      </div>
    </div>
  );
});

function SessionComplete({session,cfg,progs,onNew}){
  const t=getTPL(session.tpl,progs)||{lbl:"LIBRE",col:"#64748b"};
  const v=sessVol(session,cfg.bw);
  const sc=session.ex.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
  const [mood,setMood]=useState(3);

  // Compute real avg rest time from doneAt timestamps
  const allDoneTs=session.ex.flatMap(e=>e.sets.filter(s=>s.done&&s.doneAt).map(s=>s.doneAt)).sort((a,b)=>a-b);
  const rests=[];
  for(let i=1;i<allDoneTs.length;i++){const d=Math.round((allDoneTs[i]-allDoneTs[i-1])/1000);if(d>=5&&d<600)rests.push(d);}
  const avgRest=rests.length?Math.round(rests.reduce((a,b)=>a+b,0)/rests.length):null;

  const MOODS=[{v:1,ic:"😴",lbl:"Épuisé"},{v:2,ic:"😐",lbl:"Moyen"},{v:3,ic:"💪",lbl:"Bien"},{v:4,ic:"🔥",lbl:"Excellent"},{v:5,ic:"⚡",lbl:"PR Day !"}];
  const skipped=session.ex.filter(e=>e.skipped).length;

  return(
    <div style={{padding:"28px 18px",textAlign:"center",paddingBottom:80}} className="fi">
      <div style={{fontSize:52,marginBottom:10}} className="pp">🏆</div>
      <div className="R" style={{fontSize:26,color:t.col,marginBottom:6}}>SÉANCE TERMINÉE !</div>
      <div style={{fontSize:12,color:"var(--t2)",marginBottom:20}}>{fmt(session.date)} · {sessTitle(session,progs)}</div>

      {(()=>{const score=computeIntensityScore(session,[]); return score!==null?(<div style={{marginBottom:16}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:8,letterSpacing:".07em"}}>SCORE D'INTENSITÉ</div><IntensityBadge score={score} compact={false}/></div>):null;})()}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr"+(avgRest?"1fr":""),gap:8,marginBottom:18}}>
        {[
          {lbl:"DURÉE",val:fmtD(session.dur),col:"#38bdf8"},
          {lbl:"VOLUME",val:v>0?v.toLocaleString()+" kg":"BDC",col:t.col},
          {lbl:"SÉRIES",val:sc,col:"#f97316"},
          ...(avgRest?[{lbl:"RÉCUP MOY.",val:fmtD(avgRest),col:"#a78bfa"}]:[]),
        ].map(c=>(
          <div key={c.lbl} style={{background:"var(--s1)",borderRadius:10,padding:"11px 5px",border:"1px solid var(--bd)"}}>
            <div className="M" style={{fontSize:16,fontWeight:700,color:c.col}}>{c.val}</div>
            <div style={{fontSize:8,color:"var(--t3)",marginTop:2,letterSpacing:".07em"}}>{c.lbl}</div>
          </div>
        ))}
      </div>

      <div style={{background:"var(--s1)",borderRadius:14,padding:"14px",border:"1px solid var(--bd)",marginBottom:16}}>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:10,letterSpacing:".07em"}}>COMMENT S'EST PASSÉE CETTE SÉANCE ?</div>
        <div style={{display:"flex",justifyContent:"center",gap:8}}>
          {MOODS.map(m=>(
            <button key={m.v} onClick={()=>setMood(m.v)} style={{
              display:"flex",flexDirection:"column",alignItems:"center",gap:3,
              background:mood===m.v?t.col+"22":"transparent",
              border:"1px solid "+(mood===m.v?t.col+"55":"transparent"),
              borderRadius:10,padding:"8px 6px",cursor:"pointer",transition:"all .15s",minWidth:0,flex:1,
            }}>
              <span style={{fontSize:22}}>{m.ic}</span>
              <span style={{fontSize:9,color:mood===m.v?t.col:"var(--t3)",fontWeight:600,textAlign:"center",lineHeight:1.2}}>{m.lbl}</span>
            </button>
          ))}
        </div>
      </div>

      {session.ex.map((e,i)=>{
        const exSets=e.sets.filter(s=>s.done);
        const rpes=exSets.filter(s=>s.rpe).map(s=>s.rpe);
        const avgRpe=rpes.length?Math.round((rpes.reduce((a,b)=>a+b,0)/rpes.length)*10)/10:null;
        const rm=bestRM(e);
        return(
          <div key={i} style={{background:"var(--s1)",borderRadius:9,padding:"9px 13px",border:"1px solid var(--bd)",marginBottom:5,textAlign:"left",opacity:e.skipped?.5:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{e.skipped&&"⛔ "}{e.nm}</div>
                <div style={{fontSize:10,color:"var(--t3)",marginTop:1}}>
                  {e.skipped?"Passé":exSets.length+" séries"}
                  {!e.skipped&&rm?" · 1RM ~"+rm+"kg":""}
                  {avgRpe!==null&&<span style={{marginLeft:5}}>{["","😌","😤","💀"][Math.round(avgRpe)]||""} RPE {avgRpe}</span>}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="M" style={{fontSize:11,fontWeight:700,color:t.col}}>{exVol(e,cfg.bw)>0?exVol(e,cfg.bw)+" kg":"BDC"}</div>
                {avgRpe!==null&&(
                  <div style={{display:"flex",gap:3,marginTop:3,justifyContent:"flex-end"}}>
                    {[1,2,3].map(v=>(
                      <div key={v} style={{width:7,height:7,borderRadius:"50%",background:v<=Math.round(avgRpe)?["#00e5a0","#f97316","#f87171"][v-1]:"var(--bd)"}}/>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })}

      <button onClick={()=>onNew(mood)} style={{marginTop:12,width:"100%",background:t.col,color:"#000",border:"none",borderRadius:13,padding:"14px",fontSize:15,fontFamily:"Russo One,sans-serif",letterSpacing:".05em"}}>NOUVELLE SÉANCE</button>
    </div>
  );
}

function App(){
  const [sessions,setSessions]=useState([]);
  const [cfg,setCfg]=useState({bw:83,theme:"dark",bwlog:[]});
  const [customEx,setCustomEx]=useState([]);
  const [progs,setProgs]=useState([]);
  const [tab,setTab]=useState("session");
  const [phase,setPhase]=useState("select");
  const [curr,setCurr]=useState(null);
  const [editProg,setEditProg]=useState(null);
  const [restTimer,setRestTimer]=useState(null);
  const [prMsg,setPRMsg]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const tmRef=useRef(null),prRef=useRef(null),prevSec=useRef(null);

  useEffect(()=>{
    const saved=lsG(SK);setSessions(saved&&saved.length?saved:SEED);if(!saved||!saved.length)lsS(SK,SEED);
    setCfg(lsG(CK)||{bw:83,theme:"dark",bwlog:[]});
    setCustomEx(lsG(XK)||[]);
    const savedP=lsG(PK)||[];
    const mergedP=[...savedP];
    DEFAULT_PROGRAMS.forEach(dp=>{if(!mergedP.find(p=>p.id===dp.id))mergedP.push(dp);});
    if(mergedP.length>savedP.length)lsS(PK,mergedP);
    setProgs(mergedP);
  },[]);

  // Timer tick + audio/vibration cues
  useEffect(()=>{
    clearTimeout(tmRef.current);
    if(!restTimer||restTimer.sec<=0){
      if(restTimer&&restTimer.sec===0&&prevSec.current!==0){
        if(navigator.vibrate)navigator.vibrate([200,80,200]);
        beep(660,0.35,0.3);
      }
      prevSec.current=restTimer?.sec??null;
      return;
    }
    if(restTimer.sec===10&&prevSec.current!==10){
      if(navigator.vibrate)navigator.vibrate([80]);
      beep(1000,0.08,0.2);
    }
    prevSec.current=restTimer.sec;
    tmRef.current=setTimeout(()=>setRestTimer(t=>t?{...t,sec:Math.max(0,t.sec-1)}:null),1000);
    return()=>clearTimeout(tmRef.current);
  },[restTimer?.sec]);

  function exNamesMatch(a,b){
    if(!a||!b)return false;
    const na=a.toLowerCase().trim(),nb=b.toLowerCase().trim();
    if(na===nb)return true;
    // Contains check
    if(na.length>=4&&(nb.includes(na)||na.includes(nb)))return true;
    // Shared significant word (>=4 chars)
    const wa=na.split(/\s+/).filter(w=>w.length>=4);
    const wb=new Set(nb.split(/\s+/).filter(w=>w.length>=4));
    return wa.some(w=>wb.has(w));
  }
  function findLastEx(exId,exNm){
    for(const s of sessions){
      const found=s.ex.find(e=>e.id===exId||exNamesMatch(e.nm,exNm));
      if(found&&found.sets.some(s2=>s2.w>0||s2.r>0))return found;
    }
    return null;
  }
  function mkSets(e){
    const prev=findLastEx(e.id,e.nm);
    return Array.from({length:e.ns},(_,si)=>({
      r:prev?.sets[si]?.r??null,
      w:!e.bw?(prev?.sets[si]?.w??null):null,
      done:false,rpe:null,doneAt:null,
    }));
  }

  function startProgSession(tplId){
    const t=getTPL(tplId,progs);if(!t)return;
    setCurr({id:Date.now().toString(),date:new Date().toISOString().split("T")[0],tpl:tplId,startTime:Date.now(),dur:0,notes:"",mood:3,
      ex:t.ex.map(e=>({...e,sets:mkSets(e),skipped:false}))});
    setPhase("active");setTab("session");
  }

  function startFreeSession(selEx){
    setCurr({id:Date.now().toString(),date:new Date().toISOString().split("T")[0],tpl:"libre",startTime:Date.now(),dur:0,notes:"",mood:3,
      ex:selEx.map(e=>({...e,ns:e.nsOvr||e.ns,rp:e.rpOvr||e.rp,sets:mkSets({...e,ns:e.nsOvr||e.ns}),skipped:false}))});
    setPhase("active");setTab("session");
  }

  const updateSet=useCallback((xi,si,field,value)=>{
    setCurr(s=>({...s,ex:s.ex.map((e,i)=>i!==xi?e:{...e,
      sets:e.sets.map((set,j)=>j!==si?set:{...set,[field]:["done","rpe"].includes(field)?value:field==="doneAt"?value:(value===""?null:parseFloat(value)||0)})})}));
  },[]);

  const skipEx=useCallback(xi=>{
    setCurr(s=>({...s,ex:s.ex.map((e,i)=>i!==xi?e:{...e,skipped:true})}));
  },[]);

  const currRef=useRef(curr);
  useEffect(()=>{currRef.current=curr;},[curr]);
  const finishSession=useCallback((mood=3)=>{
    const c=currRef.current;
    if(!c)return;
    const done={...c,dur:Math.round((Date.now()-c.startTime)/1000),mood};
    setSessions(s=>{const upd=[done,...s];lsS(SK,upd);return upd;});
    setCurr(done);setPhase("complete");setRestTimer(null);
  },[]);

  function deleteSession(id){const upd=sessions.filter(s=>s.id!==id);setSessions(upd);lsS(SK,upd);}
  function saveCfg(c){setCfg(c);lsS(CK,c);setShowSettings(false);}
  function saveProg(p){const upd=progs.some(x=>x.id===p.id)?progs.map(x=>x.id===p.id?p:x):[...progs,p];setProgs(upd);lsS(PK,upd);setPhase("select");setEditProg(null);}
  function deleteProg(id){const upd=progs.filter(p=>p.id!==id);setProgs(upd);lsS(PK,upd);}
  function hidePreset(id){const nc=id===null?{...cfg,hiddenTpls:[]}:{...cfg,hiddenTpls:[...(cfg.hiddenTpls||[]).filter(x=>x!==id),id]};setCfg(nc);lsS(CK,nc);}
  function saveCustomEx(e){const upd=[...customEx,e];setCustomEx(upd);lsS(XK,upd);}
  function deleteCustomEx(id){const upd=customEx.filter(e=>e.id!==id);setCustomEx(upd);lsS(XK,upd);}
  const showPR=useCallback(msg=>{clearTimeout(prRef.current);setPRMsg(msg);},[]);

  function adjustTimer(delta){
    setRestTimer(t=>t?{...t,sec:Math.max(0,t.sec+delta),total:Math.max(t.total,t.sec+delta)}:null);
  }

  const TABS=[{id:"session",lbl:"SÉANCE",ic:"🏋️"},{id:"progress",lbl:"PROGRÈS",ic:"📈"},{id:"history",lbl:"HISTORIQUE",ic:"📋"}];
  const isFullscreen=phase==="free-builder"||phase==="prog-builder";

  return(
    <div className={cfg.theme==="light"?"light":""} style={{background:"var(--bg)",color:"var(--t1)",fontFamily:"'Outfit',sans-serif",minHeight:"100vh",position:"relative"}}>
      <div style={{height:2,background:"linear-gradient(90deg,#00e5a0,#f97316,#8b5cf6)"}}/>
      <div style={{padding:"11px 18px 9px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid var(--bd)"}}>
        <div className="R" style={{fontSize:21,letterSpacing:".1em"}}><span style={{color:"#00e5a0"}}>PERF</span><span style={{color:"var(--t2)"}}>TRACK</span><span style={{fontSize:11,color:"var(--t3)",marginLeft:7,fontFamily:"Outfit,sans-serif",fontWeight:400,letterSpacing:0}}>v5</span></div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          {phase==="active"&&curr&&<button onClick={()=>{setPhase("select");setCurr(null);setRestTimer(null)}} style={{background:"none",border:"1px solid var(--bd)",color:"var(--t3)",borderRadius:8,padding:"4px 11px",fontSize:12}}>Annuler</button>}
          <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",color:"var(--t2)",fontSize:20,padding:"4px",lineHeight:1}}>⚙️</button>
        </div>
      </div>

      {prMsg&&<PRToast msg={prMsg} onDismiss={()=>setPRMsg(null)}/>}

      {tab==="session"&&(
        phase==="select"?<SessionSelect sessions={sessions} cfg={cfg} progs={progs} onStart={startProgSession} onFree={()=>setPhase("free-builder")} onNewProg={()=>{setEditProg(null);setPhase("prog-builder");}} onEditProg={p=>{setEditProg(p);setPhase("prog-builder");}} onDeleteProg={deleteProg} onHidePreset={hidePreset}/>:
        phase==="free-builder"?<FreeBuilder sessions={sessions} customEx={customEx} onStart={startFreeSession} onBack={()=>setPhase("select")} onSaveCustomEx={saveCustomEx}/>:
        phase==="prog-builder"?<ProgBuilder editProg={editProg} customEx={customEx} onSave={saveProg} onBack={()=>{setPhase("select");setEditProg(null);}} onSaveCustomEx={saveCustomEx}/>:
        phase==="active"&&curr?<ActiveSession session={curr} sessions={sessions} cfg={cfg} progs={progs} onUpdateSet={updateSet} onFinish={finishSession} onTimer={(sec,nm,nextEx,nextPrevW)=>setRestTimer({sec,total:sec,nm,nextEx,nextPrevW:nextPrevW||0})} onPR={showPR} onSkipEx={skipEx}/>:
        phase==="complete"&&curr?<SessionComplete session={curr} cfg={cfg} progs={progs} onNew={finishSession}/>:null
      )}
      {tab==="progress"&&<ProgressTab sessions={sessions} cfg={cfg} progs={progs}/>}
      {tab==="history"&&<HistoryTab sessions={sessions} cfg={cfg} progs={progs} onDelete={deleteSession}/>}

      {restTimer&&phase==="active"&&<RestTimer timer={restTimer} onSkip={()=>setRestTimer(null)} onAdjust={adjustTimer}/>}
      {showSettings&&<SettingsPanel cfg={cfg} customEx={customEx} progs={progs} onSave={saveCfg} onClose={()=>setShowSettings(false)} onDeleteCustomEx={deleteCustomEx} onRestorePreset={id=>hidePreset(id)}/>}

      {!isFullscreen&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:480,margin:"0 auto",background:"var(--s1)",borderTop:"1px solid var(--bd)",display:"flex",zIndex:100}}>
          {TABS.map(t=>{
            const a=tab===t.id;
            return(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"9px 0 13px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
                {a&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:22,height:2,background:"#00e5a0",borderRadius:2}}/>}
                <span style={{fontSize:20}}>{t.ic}</span>
                <span style={{fontSize:9,letterSpacing:".08em",fontFamily:"Russo One,sans-serif",color:a?"#00e5a0":"var(--t3)",transition:"color .15s"}}>{t.lbl}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
