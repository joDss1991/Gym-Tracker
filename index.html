<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<title>PerfTrack</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="PerfTrack"/>
<meta name="theme-color" content="#080c0f"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080c0f;--s1:#0d1318;--s2:#141c23;--s3:#1a2430;--bd:#1f2d3d;--gr:#00e5a0;--or:#f97316;--re:#f87171;--bl:#38bdf8;--pu:#8b5cf6;--t1:#e8f0f8;--t2:#8fa8c0;--t3:#506070}
body{background:var(--bg);color:var(--t1);font-family:system-ui,sans-serif;min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:70px}
button,input,select{font-family:inherit;outline:none;cursor:pointer}
input[type=number]{-moz-appearance:textfield;cursor:text}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.card{background:var(--s1);border-radius:14px;border:1px solid var(--bd)}
.tag{display:inline-block;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.06em}
.mono{font-family:'Courier New',monospace;font-weight:700}
.bold{font-weight:700}
.btn{border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:600;width:100%}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--s1);border-top:1px solid var(--bd);display:flex;z-index:100}
.nav-tab{flex:1;padding:8px 0 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none}
.nav-tab span:first-child{font-size:20px}
.nav-tab span:last-child{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--t3)}
.nav-tab.active span:last-child{color:var(--gr)}
.nav-tab.active::before{content:'';position:absolute;top:0;width:22px;height:2px;background:var(--gr);border-radius:2px}
.float-btn{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:424px;z-index:150;border-radius:16px;padding:13px 18px;border:none;display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:800;letter-spacing:.05em;cursor:pointer;transition:all .2s}
.set-row{display:flex;align-items:center;gap:5px;border-radius:10px;padding:7px 5px;margin-bottom:5px;border:1px solid transparent;transition:background .2s}
.set-row.active{background:var(--s2)}
.set-row.done{background:rgba(0,229,160,.09);border-color:#00b07d55}
.inp{background:var(--s3);border:1px solid #2a3d52;border-radius:7px;padding:8px 2px;color:var(--t1);font-size:15px;font-family:monospace;font-weight:700;text-align:center;width:100%;min-width:0}
.inp.done{color:var(--gr);border-color:#00b07d55}
.adj{background:var(--s3);border:none;border-radius:7px;width:36px;height:42px;font-size:18px;color:var(--t2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.val-btn{border:none;border-radius:10px;height:46px;width:46px;font-size:20px;flex-shrink:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;overflow-y:auto;padding:20px}
.panel{background:var(--s1);border-radius:16px;padding:20px;border:1px solid var(--bd);max-width:440px;margin:0 auto}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade{animation:fadeIn .2s ease}
</style>
</head>
<body>
<div id="app"></div>
<div id="overlays"></div>

<script>
// ══════════════════ DATA ══════════════════
const PROGS = {
  j1:{id:'j1',name:'Jour 1 — Force',lbl:'FORCE',col:'#00e5a0',ex:[
    {id:'tl',nm:'Tractions lestées',mu:'Dos',ns:5,rp:'3–5',rt:180,bw:0},
    {id:'sq',nm:'Squat',mu:'Jambes',ns:4,rp:'6',rt:120,bw:0},
    {id:'dc',nm:'Développé couché',mu:'Pectoraux',ns:3,rp:'8',rt:90,bw:0},
    {id:'fb',nm:'Fentes bulgares',mu:'Jambes',ns:3,rp:'10',rt:60,bw:1},
    {id:'pl',nm:'Gainage planche',mu:'Core',ns:3,rp:'60s',rt:45,bw:1}]},
  j2:{id:'j2',name:'Jour 2 — Volume',lbl:'VOLUME',col:'#f97316',ex:[
    {id:'em',nm:'Tractions EMOM',mu:'Dos',ns:1,rp:'50r/10min',rt:0,bw:1},
    {id:'sd',nm:'Soulevé de Terre',mu:'Dos',ns:3,rp:'12',rt:90,bw:0},
    {id:'dm',nm:'Développé militaire',mu:'Épaules',ns:3,rp:'10',rt:90,bw:0},
    {id:'po',nm:'Pompes explosives',mu:'Pectoraux',ns:3,rp:'Max',rt:60,bw:1},
    {id:'mo',nm:'Mollets debout',mu:'Mollets',ns:4,rp:'15',rt:45,bw:0}]},
  j3:{id:'j3',name:'Jour 3 — Explosivité',lbl:'EXPLO',col:'#8b5cf6',ex:[
    {id:'tn',nm:'Tractions négatives',mu:'Dos',ns:3,rp:'3(5s)',rt:120,bw:1},
    {id:'bj',nm:'Box Jumps',mu:'Jambes',ns:5,rp:'4',rt:120,bw:1},
    {id:'pg',nm:'Pogo Jumps',mu:'Mollets',ns:3,rp:'20s',rt:60,bw:1},
    {id:'tb',nm:'Tirage bûcheron',mu:'Dos',ns:3,rp:'10',rt:90,bw:0},
    {id:'sp',nm:'Sprints 10m',mu:'Cardio',ns:5,rp:'5',rt:60,bw:1}]},
  match:{id:'match',name:'Veille de Match',lbl:'MATCH',col:'#f97316',ex:[
    {id:'bk_sq',nm:'Squat barre',mu:'Jambes',ns:3,rp:'4',rt:120,bw:0},
    {id:'jsq',nm:'Jump Squat',mu:'Jambes',ns:3,rp:'5',rt:90,bw:1},
    {id:'rdl',nm:'Romanian Deadlift',mu:'Dos',ns:3,rp:'5',rt:90,bw:0},
    {id:'hip',nm:'Hip Thrust',mu:'Jambes',ns:2,rp:'8',rt:60,bw:0},
    {id:'dco',nm:'Développé couché',mu:'Pectoraux',ns:3,rp:'5',rt:90,bw:0},
    {id:'trh',nm:'Tirage horizontal',mu:'Dos',ns:3,rp:'6',rt:90,bw:0},
    {id:'brj',nm:'Broad Jumps',mu:'Jambes',ns:3,rp:'3',rt:120,bw:1},
    {id:'stu',nm:'Step-up explosif',mu:'Jambes',ns:2,rp:'5',rt:60,bw:1}]}
};

// ══════════════════ STATE ══════════════════
const LS = (k,v) => { try { if(v===undefined) return JSON.parse(localStorage.getItem(k)); localStorage.setItem(k,JSON.stringify(v)); } catch{} return null; };

let sessions = LS('pt_s') || [];
let cfg = LS('pt_c') || {bw:83, hidden:[]};
let userProgs = LS('pt_p') || [];
let view = 'home';
let sess = null; // active session
let sessStart = 0;
let elapsedTmr = null;
let restTmr = null;
let restLeft = 0, restTotal = 0, restName = '';
let expandedEx = new Set();
let expandedHist = new Set();

function allProgs(inclHidden) {
  const h = cfg.hidden||[];
  const r = {};
  Object.values(PROGS).forEach(p=>{ if(inclHidden||!h.includes(p.id)) r[p.id]=p; });
  userProgs.forEach(p=>{ if(inclHidden||!h.includes(p.id)) r[p.id]=p; });
  return r;
}

function normNm(s) { return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\w\s]/g,'').trim(); }
function wordsMatch(a,b) {
  const wa=normNm(a).split(/\s+/).filter(w=>w.length>2);
  const wb=normNm(b).split(/\s+/).filter(w=>w.length>2);
  if(!wa.length||!wb.length) return normNm(a)===normNm(b);
  const common=wa.filter(w=>wb.includes(w));
  return common.length>=Math.ceil(Math.min(wa.length,wb.length)*0.7);
}
function findLastEx(exId, exNm) {
  for(const s of [...sessions].sort((a,b)=>b.date>a.date?1:-1)) {
    const f = s.ex.find(e => e.id===exId || wordsMatch(e.nm,exNm));
    if(f && f.sets.some(s=>s.w>0||s.r>0)) return f;
  }
  return null;
}
function mkSets(ex) {
  const prev = findLastEx(ex.id, ex.nm);
  return Array.from({length:ex.ns},(_,i)=>({
    r: prev?.sets[i]?.r||null,
    w: !ex.bw?(prev?.sets[i]?.w||null):null,
    done:false, rpe:null, doneAt:null
  }));
}
function fmtD(s) { return Math.floor(s/60)+'m'+(s%60?s%60+'s':''); }
function fmtDate(d) { return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }
function oneRM(w,r) { return r>=1&&r<=10&&w>0?Math.round(w*36/(37-r)):null; }
function exVol(ex) { return ex.sets.reduce((a,s)=>a+(s.r||0)*(s.w>0?s.w:(ex.bw?cfg.bw:0)),0); }
function sessVol(s) { return s.ex.reduce((a,e)=>a+exVol(e),0); }
function saveDraft() { if(sess) LS('pt_draft',{sess,start:sessStart}); }
function clearDraft() { try{localStorage.removeItem('pt_draft')}catch{} }

// ══════════════════ RENDER ══════════════════
function R() {
  document.getElementById('app').innerHTML = getView();
  bindEvents();
  updateElapsed();
  if(restLeft>0) updateRestBanner(); else { const b=document.getElementById('rest-bar'); if(b) b.style.display='none'; }
}

function getView() {
  if(view==='home') return homeHTML();
  if(view==='session') return sessionHTML();
  if(view==='complete') return completeHTML();
  if(view==='progress') return progressHTML();
  if(view==='history') return historyHTML();
  return '';
}

function navHTML(active) {
  return `<div class="nav">
    ${[['home','🏋️','SÉANCE'],['progress','📈','PROGRÈS'],['history','📋','HISTORIQUE']].map(([id,ic,lbl])=>`
    <button class="nav-tab ${active===id?'active':''}" style="position:relative" data-nav="${id}">
      <span>${ic}</span><span>${lbl}</span>
    </button>`).join('')}
  </div>`;
}

// ── HOME ──
function homeHTML() {
  const progs = allProgs();
  const lastBy = {};
  sessions.forEach(s=>{ if(!lastBy[s.tpl]) lastBy[s.tpl]=s; });
  
  const cards = Object.values(progs).map(p => {
    const last = lastBy[p.id];
    const v = last ? sessVol(last) : 0;
    const mus = [...new Set((p.ex||[]).map(e=>e.mu))];
    return `<div class="card" style="overflow:hidden;margin-bottom:10px">
      <div style="height:3px;background:${p.col}"></div>
      <div style="padding:14px 16px;cursor:pointer" data-start="${p.id}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span class="tag" style="background:${p.col}22;color:${p.col};border:1px solid ${p.col}44">${p.lbl||p.name.slice(0,6)}</span>
          <span style="font-weight:700;font-size:15px">${p.name.replace(/.*–\s*/,'')}</span>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:${last?'10px':'0'}">
          ${mus.map(m=>`<span style="background:var(--s3);color:var(--t3);font-size:9px;padding:2px 6px;border-radius:3px">${m}</span>`).join('')}
        </div>
        ${last?`<div style="display:flex;gap:16px;padding-top:8px;border-top:1px solid var(--bd)">
          <div><div style="font-size:9px;color:var(--t3)">DERNIÈRE</div><div style="font-size:12px;font-weight:600;color:var(--t2)">${fmtDate(last.date)}</div></div>
          ${v>0?`<div><div style="font-size:9px;color:var(--t3)">VOLUME</div><div class="mono" style="font-size:12px;color:${p.col}">${v.toLocaleString()} kg</div></div>`:''}
        </div>`:''}
      </div>
      <div style="display:flex;border-top:1px solid var(--bd)">
        <button style="flex:2;background:none;border:none;color:var(--t2);padding:8px;font-size:12px" data-start="${p.id}">▶ Démarrer</button>
        <button style="flex:1;background:none;border:none;border-left:1px solid var(--bd);color:var(--bl);padding:8px;font-size:11px" onclick="editProg('${p.id}')">✏️ Éditer</button>
        ${PROGS[p.id]?
          `<button style="flex:1;background:none;border:none;border-left:1px solid var(--bd);color:var(--t3);padding:8px;font-size:11px" data-hide="${p.id}">🙈</button>`:
          `<button style="flex:1;background:none;border:none;border-left:1px solid var(--bd);color:var(--re);padding:8px;font-size:11px" data-del="${p.id}">🗑</button>`
        }
      </div>
    </div>`;
  }).join('');

  const hidden = (cfg.hidden||[]);
  
  return `<div style="padding-bottom:80px">
    <div style="padding:20px 18px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd)">
      <div style="font-size:26px;font-weight:900;letter-spacing:.08em">
        <span style="color:var(--gr)">PERF</span><span style="color:var(--t2)">TRACK</span>
      </div>
      <button style="background:none;border:none;font-size:22px" data-action="settings">⚙️</button>
    </div>
    <div style="padding:12px 16px">
      ${cards}
      ${hidden.length?`<button style="width:100%;background:transparent;border:1px dashed var(--bd);color:var(--t3);border-radius:10px;padding:10px;font-size:12px;margin-bottom:8px" data-action="restore">🔄 Restaurer ${hidden.length} programme(s) masqué(s)</button>`:''}
      <button style="width:100%;background:transparent;border:1px dashed var(--bd);color:var(--gr);border-radius:10px;padding:12px;font-size:13px;font-weight:600" data-action="addprog">＋ Nouveau programme</button>
    </div>
    ${sessions.slice(0,4).length?`<div style="padding:4px 18px 0">
      <div style="font-size:11px;color:var(--t3);margin-bottom:8px;letter-spacing:.08em">RÉCENTES</div>
      ${[...sessions].sort((a,b)=>b.date>a.date?1:-1).slice(0,4).map(s=>{
        const p=allProgs()[s.tpl]||{col:'#64748b',name:s.tpl};
        const v=sessVol(s);
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:7px;height:7px;border-radius:50%;background:${p.col};flex-shrink:0"></div>
            <div>
              <div style="font-size:13px;font-weight:700">${fmtDate(s.date)}</div>
              <div style="font-size:11px;color:var(--t3)">${p.name}</div>
            </div>
          </div>
          <div class="mono" style="font-size:12px;color:${p.col}">${v>0?v.toLocaleString()+' kg':'—'}</div>
        </div>`;
      }).join('')}
    </div>`:''}
    ${navHTML('home')}
  </div>`;
}

// ── SESSION ──
function sessionHTML() {
  if(!sess) return homeHTML();
  const p = allProgs()[sess.tpl]||{col:'#64748b',lbl:'?',name:'Séance'};
  const allSets = sess.ex.flatMap(e=>e.sets);
  const done = allSets.filter(s=>s.done).length;
  const pct = allSets.length>0?done/allSets.length*100:0;

  const exCards = sess.ex.map((ex,xi)=>{
    const doneSets = ex.sets.filter(s=>s.done).length;
    const allDone = ex.sets.every(s=>s.done||s.skipped_set);
    const isOpen = expandedEx.has(xi);
    
    const setRows = isOpen ? ex.sets.map((set,si)=>{
      const isActive = !set.done && ex.sets.slice(0,si).every(s=>s.done||s.skipped_set);
      const cls = set.done?'done':isActive?'active':'';
      const inpCls = set.done?'inp done':'inp';
      const wVal = set.w!=null?set.w:'';
      const rVal = set.r!=null?set.r:'';
      
      const weightCell = ex.bw?'':
        `<div style="display:flex;align-items:center;gap:2px;flex:1;min-width:0">
          <button class="adj" data-adj="${xi},${si},w,-2.5">−</button>
          <input class="${inpCls}" type="number" inputmode="decimal" step="0.5" value="${wVal}" placeholder="kg" data-inp="${xi},${si},w">
          <button class="adj" data-adj="${xi},${si},w,2.5">+</button>
        </div>`;
      
      const rpeRow = (isActive||set.done)?`
        <div style="display:flex;gap:5px;padding-left:24px;margin-top:3px;flex-wrap:wrap">
          ${[['1','😌','Facile','#00e5a0'],['2','😤','Dur','#f97316'],['3','💀','Max','#f87171']].map(([v,ic,lbl,c])=>`
          <button style="background:${set.rpe==v?c+'22':'var(--s2)'};border:1px solid ${set.rpe==v?c+'55':'var(--bd)'};border-radius:16px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:4px" data-rpe="${xi},${si},${v}">
            ${ic}<span style="font-size:10px;color:${set.rpe==v?c:'var(--t3)'}"> ${lbl}</span>
          </button>`).join('')}
        </div>`:'';
      
      return `<div class="set-row ${cls}" id="row-${xi}-${si}">
        <div class="mono" style="font-size:13px;color:var(--t3);min-width:20px;text-align:center;flex-shrink:0">${si+1}</div>
        ${weightCell}
        <div style="display:flex;align-items:center;gap:2px;flex:1;min-width:0">
          <button class="adj" data-adj="${xi},${si},r,-1">−</button>
          <input class="${inpCls}" type="number" inputmode="numeric" value="${rVal}" placeholder="reps" data-inp="${xi},${si},r">
          <button class="adj" data-adj="${xi},${si},r,1">+</button>
        </div>
        <button class="val-btn" style="background:${set.done?p.col+'33':p.col};color:${set.done?p.col:'#000'};border:${set.done?'1px solid '+p.col:'none'}" 
          data-validate="${xi},${si}" ${set.done?'data-longpress="'+xi+','+si+'"':''}>
          ${set.done?'✓':'›'}
        </button>
      </div>${rpeRow}`;
    }).join('') : '';

    const hasDone = ex.sets.some(s=>s.done);
    const hasUndone = ex.sets.some(s=>!s.done&&!s.skipped_set);
    const actionBtns = (hasDone&&hasUndone&&isOpen)?`
      <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;padding:0 4px 4px">
        <button style="background:var(--s2);border:1px solid var(--bd);color:var(--t2);border-radius:7px;padding:5px 10px;font-size:10px" data-copy="${xi}">⎘ Copier</button>
        <button style="background:rgba(248,113,113,.1);border:1px solid #f8717133;color:var(--re);border-radius:7px;padding:5px 10px;font-size:10px" data-finish="${xi}">↩ Terminer ici</button>
      </div>`:'';

    const colHdr = (isOpen&&!ex.bw)?`<div style="display:flex;gap:5px;padding:0 5px 3px">
      <div style="font-size:9px;color:var(--t3);min-width:20px;flex-shrink:0">S</div>
      <div style="font-size:9px;color:var(--t3);flex:1;text-align:center">KG</div>
      <div style="font-size:9px;color:var(--t3);flex:1;text-align:center">REPS</div>
      <div style="width:46px;flex-shrink:0"></div>
    </div>`:(isOpen?`<div style="display:flex;gap:5px;padding:0 5px 3px">
      <div style="font-size:9px;color:var(--t3);min-width:20px;flex-shrink:0">S</div>
      <div style="font-size:9px;color:var(--t3);flex:1;text-align:center">REPS</div>
      <div style="width:46px;flex-shrink:0"></div>
    </div>`:'');

    return `<div class="card" style="overflow:hidden;border-color:${allDone?p.col+'55':'var(--bd)'}">
      <div style="padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer" data-toggle="${xi}">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            ${allDone?`<span style="color:${p.col};font-size:11px">✓ </span>`:''}
            <span style="font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ex.nm}</span>
            <span style="background:rgba(255,255,255,.08);color:var(--t3);font-size:9px;padding:1px 5px;border-radius:3px">${ex.mu}</span>
          </div>
          <div style="font-size:10px;color:var(--t3);margin-top:2px">${ex.ns}×${ex.rp}${ex.rt>0?' · ⏱'+fmtD(ex.rt):''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          <span class="mono" style="font-size:11px;color:${p.col}">${doneSets}/${ex.sets.length}</span>
          ${isOpen&&!allDone?`<button style="background:none;border:none;color:var(--t3);font-size:11px;padding:2px 4px;opacity:.6" data-rmex="${xi}">✕</button>`:''}
          <span style="color:var(--t3);font-size:16px;transform:${isOpen?'rotate(90deg)':'none'};transition:transform .2s">›</span>
        </div>
      </div>
      ${isOpen?`<div style="padding:0 12px 10px">${colHdr}${setRows}${actionBtns}</div>`:''}
    </div>`;
  }).join('<div style="margin-bottom:7px"></div>');

  // Add exercise / replace button (shown at bottom of list)
  const addExBtn = `<div style="padding:4px 14px 8px">
    <button style="width:100%;background:transparent;border:1px dashed var(--bd);color:var(--bl);border-radius:10px;padding:10px;font-size:12px;font-weight:600" data-action="addex">＋ Ajouter / Remplacer un exercice</button>
  </div>`;

  // Find next active set for float button
  let aXi=-1,aSi=-1,aEx=null;
  outer: for(let xi=0;xi<sess.ex.length;xi++) {
    if(sess.ex[xi].skipped) continue;
    for(let si=0;si<sess.ex[xi].sets.length;si++) {
      if(!sess.ex[xi].sets[si].done&&!sess.ex[xi].sets[si].skipped_set){aXi=xi;aSi=si;aEx=sess.ex[xi];break outer;}
    }
  }
  const ready = aEx&&(aEx.bw?((aEx.sets[aSi].r||0)>0):((aEx.sets[aSi].w||0)>0&&(aEx.sets[aSi].r||0)>0));
  const floatBtn = aXi>=0&&pct<100?`
    <button class="float-btn" style="background:${ready?p.col:'var(--s3)'};color:${ready?'#000':'var(--t3)'};border:1px solid ${ready?p.col:'var(--bd2)'};box-shadow:${ready?'0 4px 24px '+p.col+'55':'none'}" data-validate="${aXi},${aSi}">
      <div style="text-align:left">

      </div>
      <span style="font-size:24px;opacity:${ready?1:.4}">›</span>
    </button>`:'';

  return `<div style="padding-bottom:160px">
    <div style="position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--bd);padding:10px 16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <span class="tag" style="background:${p.col}22;color:${p.col};border:1px solid ${p.col}44">${p.lbl}</span>
          <div style="font-weight:700;font-size:13px;margin-top:3px">${p.name.replace(/.*–\s*/,'')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="mono" id="elapsed" style="font-size:22px;color:${p.col}">00:00</div>
          <button style="background:none;border:1px solid var(--bd);color:var(--t3);border-radius:8px;padding:4px 10px;font-size:12px" data-action="stop">Arrêter</button>
        </div>
      </div>
      <div style="height:3px;background:var(--bd);border-radius:2px">
        <div style="height:100%;background:${p.col};width:${pct}%;transition:width .4s;border-radius:2px"></div>
      </div>
    </div>
    <div style="padding:8px 14px;display:flex;flex-direction:column;gap:7px">${exCards}</div>
    ${addExBtn}
    ${floatBtn}
    <div id="rest-bar" style="display:none"></div>
    <div style="padding:0 14px;margin-top:4px">
      <button style="width:100%;background:${pct>=100?p.col:'var(--s2)'};color:${pct>=100?'#000':'var(--t2)'};border:1px solid ${pct>=100?p.col:'var(--bd)'};border-radius:14px;padding:14px;font-size:15px;font-weight:800;transition:all .3s" data-action="finish">
        ${pct>=100?'✓ TERMINER LA SÉANCE':'TERMINER (incomplet)'}
      </button>
    </div>
  </div>`;
}

// ── PROGRESS ──
function progressHTML() {
  const sorted = [...sessions].sort((a,b)=>a.date>b.date?1:-1);
  if(!sorted.length) return `<div style="padding-bottom:80px">
    <div style="padding:16px 18px 10px"><div style="font-size:22px;font-weight:900">PROGRÈS</div></div>
    <div style="padding:40px;text-align:center;color:var(--t3)">Lance ta première séance !</div>
    ${navHTML('progress')}</div>`;

  const totalVol = sorted.reduce((a,s)=>a+sessVol(s),0);
  const maxWt = Math.max(0,...sorted.flatMap(s=>s.ex.flatMap(e=>e.sets.map(st=>st.w||0))));
  const avgDur = Math.round(sorted.reduce((a,s)=>a+(s.dur||0),0)/60/sorted.length);

  // Streak
  const wkMap={};
  sorted.forEach(s=>{const d=new Date(s.date);d.setDate(d.getDate()-((d.getDay()+6)%7));wkMap[d.toISOString().split('T')[0]]=(wkMap[d.toISOString().split('T')[0]]||0)+1;});
  let streak=0;const today=new Date();today.setDate(today.getDate()-((today.getDay()+6)%7));let chk=new Date(today);
  for(let i=0;i<52;i++){const k=chk.toISOString().split('T')[0];if((wkMap[k]||0)>=2)streak++;else if(i>0)break;chk.setDate(chk.getDate()-7);}

  // Bar chart
  const volData = sorted.slice(-10).map(s=>({v:sessVol(s),col:(allProgs()[s.tpl]||{col:'#00e5a0'}).col,lbl:fmtDate(s.date).split(' ')[0]}));
  const maxV = Math.max(...volData.map(d=>d.v),1);
  const bars = volData.map((d,i)=>{
    const h=Math.max(2,Math.round((d.v/maxV)*70));
    return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;gap:3px">
      <div style="width:100%;background:${d.col};border-radius:3px 3px 0 0;height:${h}px;opacity:.9"></div>
      <div style="font-size:8px;color:var(--t3);text-align:center">${d.lbl}</div>
    </div>`;
  }).join('');

  // Records
  const rm={};
  sorted.forEach(s=>s.ex.forEach(e=>e.sets.forEach(st=>{
    if(st.w>0){const x=oneRM(st.w,st.r)||0;if(!rm[e.id]||st.w>rm[e.id].bw){rm[e.id]={nm:e.nm,mu:e.mu,bw:st.w,br:st.r||0,rm:x};}}
  })));
  const recs = Object.values(rm).sort((a,b)=>b.bw-a.bw).slice(0,8);

  return `<div style="padding-bottom:80px">
    <div style="padding:16px 18px 10px"><div style="font-size:22px;font-weight:900">PROGRÈS</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 14px">
      ${[['SÉANCES',sorted.length,'#00e5a0'],['VOLUME',totalVol>0?(totalVol/1000).toFixed(1)+'k kg':'—','#f97316'],['STREAK',streak+'sem.','#fbbf24'],['DURÉE MOY.',avgDur+'min','#38bdf8']].map(([l,v,c])=>`
      <div class="card" style="padding:12px;border:1px solid var(--bd)">
        <div class="mono" style="font-size:17px;color:${c}">${v}</div>
        <div style="font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:.06em">${l}</div>
      </div>`).join('')}
    </div>
    <div style="padding:0 16px 14px">
      <div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:8px;letter-spacing:.08em">VOLUME PAR SÉANCE</div>
      <div class="card" style="padding:12px;border:1px solid var(--bd)">
        <div style="display:flex;align-items:flex-end;gap:3px;height:80px;padding-bottom:0">${bars}</div>
      </div>
    </div>
    ${recs.length?`<div style="padding:0 16px 14px">
      <div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:8px;letter-spacing:.08em">🏆 RECORDS</div>
      ${recs.map(r=>`<div class="card" style="padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--bd)">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.nm}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:1px">${r.mu}${r.rm>0?' · 1RM ~'+r.rm+'kg':''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="display:flex;align-items:baseline;gap:2px;justify-content:flex-end">
            <span class="mono" style="font-size:20px;color:var(--gr)">${r.bw}</span>
            <span style="font-size:11px;color:var(--t2)">kg</span>
          </div>
          ${r.br>0?`<div style="font-size:11px;color:var(--t3)">× ${r.br} reps</div>`:''}
        </div>
      </div>`).join('')}
    </div>`:''}
    ${navHTML('progress')}
  </div>`;
}

// ══════════════════ EVENTS ══════════════════
let _bound=false;
function bindEvents() {
  if(_bound) return;
  _bound=true;
  document.getElementById('app').addEventListener('click', handleClick);
  document.getElementById('app').addEventListener('change', handleChange);
  let pressTimer=null;
  document.getElementById('app').addEventListener('touchstart', e=>{
    const lp=e.target.closest('[data-longpress]');
    if(lp){const [xi,si]=lp.dataset.longpress.split(',').map(Number);pressTimer=setTimeout(()=>{unvalidate(xi,si);},700);}
  });
  document.getElementById('app').addEventListener('touchend', ()=>clearTimeout(pressTimer));
}

function handleClick(e) {
  const t = e.target.closest('[data-start],[data-nav],[data-action],[data-toggle],[data-validate],[data-adj],[data-rpe],[data-copy],[data-finish],[data-hist],[data-delses],[data-hide],[data-del]');
  if(!t) return;

  if(t.dataset.nav) {
    if(view==='session') return;
    view=t.dataset.nav; R(); return;
  }
  if(t.dataset.start) { startSession(t.dataset.start); return; }
  if(t.dataset.toggle) { const xi=+t.dataset.toggle; expandedEx.has(xi)?expandedEx.delete(xi):expandedEx.add(xi); R(); return; }
  if(t.dataset.validate) { const [xi,si]=t.dataset.validate.split(',').map(Number); validate(xi,si); return; }
  if(t.dataset.adj) { const [xi,si,f,d]=t.dataset.adj.split(','); adjVal(+xi,+si,f,+d); return; }
  if(t.dataset.rpe) { const [xi,si,v]=t.dataset.rpe.split(','); setRpe(+xi,+si,+v); return; }
  if(t.dataset.copy) { copyLast(+t.dataset.copy); return; }
  if(t.dataset.finish) { finishEx(+t.dataset.finish); return; }
  if(t.dataset.hist) { const id=t.dataset.hist; expandedHist.has(id)?expandedHist.delete(id):expandedHist.add(id); R(); return; }
  if(t.dataset.delses) { if(confirm('Supprimer cette séance ?')){sessions=sessions.filter(s=>s.id!==t.dataset.delses);LS('pt_s',sessions);R();} return; }
  if(t.dataset.hide) { cfg.hidden=[...(cfg.hidden||[]).filter(x=>x!==t.dataset.hide),t.dataset.hide];LS('pt_c',cfg);R(); return; }
  if(t.dataset.del) { if(confirm('Supprimer ce programme ?')){userProgs=userProgs.filter(p=>p.id!==t.dataset.del);LS('pt_p',userProgs);R();} return; }

  const action = t.dataset.action;
  if(action==='settings') { showSettings(); return; }
  if(action==='stop') { showStopDialog(); return; }
  if(action==='finish') { if(sess){saveSession();} return; }
  if(action==='newses') { sess=null;view='home';R(); return; }
  if(action==='restore') { cfg.hidden=[];LS('pt_c',cfg);R(); return; }
  if(action==='addprog') { showAddProg(); return; }
  if(action==='addex') { showAddSessionEx(); return; }
}

function handleChange(e) {
  const inp = e.target.closest('[data-inp]');
  if(!inp) return;
  const [xi,si,f]=inp.dataset.inp.split(',');
  const val=inp.value===''?null:parseFloat(inp.value)||0;
  sess.ex[+xi].sets[+si][f]=val;
  saveDraft();
  // Update float button
  const fb=document.querySelector('.float-btn');
  if(fb) { view='session'; updateFloatBtn(); }
}

function updateFloatBtn() {
  if(view!=='session'||!sess) return;
  const p=allProgs()[sess.tpl]||{col:'#00e5a0'};
  let aXi=-1,aSi=-1,aEx=null;
  outer: for(let xi=0;xi<sess.ex.length;xi++){if(sess.ex[xi].skipped)continue;for(let si=0;si<sess.ex[xi].sets.length;si++){if(!sess.ex[xi].sets[si].done&&!sess.ex[xi].sets[si].skipped_set){aXi=xi;aSi=si;aEx=sess.ex[xi];break outer;}}}
  const fb=document.querySelector('.float-btn');
  if(!fb||aXi<0) return;
  const set=aEx.sets[aSi];
  const ready=aEx.bw?((set.r||0)>0):((set.w||0)>0&&(set.r||0)>0);
  fb.style.background=ready?p.col:'var(--s3)';
  fb.style.color=ready?'#000':'var(--t3)';
}

// ══════════════════ SESSION LOGIC ══════════════════
function startSession(tplId) {
  const p=allProgs()[tplId];if(!p)return;
  expandedEx=new Set([0]);
  sess={id:Date.now().toString(),date:new Date().toISOString().split('T')[0],tpl:tplId,startTime:Date.now(),dur:0,ex:(p.ex||[]).map(e=>({...e,sets:mkSets(e),skipped:false}))};
  sessStart=Date.now();view='session';
  startElapsed();R();
}

function validate(xi,si) {
  if(!sess)return;
  const set=sess.ex[xi].sets[si];
  if(set.done)return;
  set.done=true;set.doneAt=Date.now();
  if(navigator.vibrate)navigator.vibrate(50);
  saveDraft();
  const ex=sess.ex[xi];
  if(ex.rt>0) startRest(ex.rt,ex.nm);
  // Auto-open next exercise
  for(let nxi=xi;nxi<sess.ex.length;nxi++){
    const startSi=nxi===xi?si+1:0;
    for(let nsi=startSi;nsi<sess.ex[nxi].sets.length;nsi++){
      if(!sess.ex[nxi].sets[nsi].done&&!sess.ex[nxi].sets[nsi].skipped_set){
        if(!expandedEx.has(nxi)){expandedEx.add(nxi);}
        R();
        setTimeout(()=>document.getElementById('row-'+nxi+'-'+nsi)?.scrollIntoView({behavior:'smooth',block:'nearest'}),200);
        return;
      }
    }
  }
  R();
}

function unvalidate(xi,si) {
  if(!sess)return;
  sess.ex[xi].sets[si].done=false;sess.ex[xi].sets[si].doneAt=null;
  saveDraft();R();
}

function adjVal(xi,si,f,d) {
  if(!sess)return;
  const cur=sess.ex[xi].sets[si][f]||0;
  const nv=Math.max(0,Math.round((cur+d)*4)/4);
  sess.ex[xi].sets[si][f]=nv;
  const inp=document.querySelector(`[data-inp="${xi},${si},${f}"]`);
  if(inp){inp.value=nv||'';}
  clearTimeout(adjVal._t);adjVal._t=setTimeout(saveDraft,600);
  updateFloatBtn();
}

function setRpe(xi,si,v) {
  if(!sess)return;
  sess.ex[xi].sets[si].rpe=sess.ex[xi].sets[si].rpe===v?null:v;
  saveDraft();R();
}

function copyLast(xi) {
  if(!sess)return;
  const ex=sess.ex[xi];
  const last=[...ex.sets].reverse().find(s=>s.done);
  if(!last)return;
  const nxt=ex.sets.find(s=>!s.done);
  if(!nxt)return;
  if(last.w!=null)nxt.w=last.w;if(last.r!=null)nxt.r=last.r;
  saveDraft();R();
}

function finishEx(xi) {
  if(!sess)return;
  sess.ex[xi].sets.forEach(s=>{if(!s.done)s.skipped_set=true;});
  saveDraft();R();
}

function saveSession() {
  if(!sess)return;
  stopTimers();
  sess.dur=Math.round((Date.now()-sessStart)/1000);
  sessions=[sess,...sessions];LS('pt_s',sessions);
  clearDraft();view='complete';R();
}

function stopTimers() {
  if(elapsedTmr){clearInterval(elapsedTmr);elapsedTmr=null;}
  if(restTmr){clearInterval(restTmr);restTmr=null;}
}

function showStopDialog() {
  const ov=document.createElement('div');
  ov.className='overlay';
  ov.innerHTML=`<div class="panel">
    <div style="font-size:18px;font-weight:800;margin-bottom:8px">Arrêter la séance ?</div>
    <div style="font-size:13px;color:var(--t2);margin-bottom:20px">Les séries déjà validées seront sauvegardées.</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button style="background:#00e5a022;color:#00e5a0;border:1px solid #00e5a044;border-radius:10px;padding:12px;font-size:14px;font-weight:700" id="btn-save">💾 Sauvegarder</button>
      <button style="background:#f8717122;color:var(--re);border:1px solid #f8717133;border-radius:10px;padding:12px;font-size:14px;font-weight:700" id="btn-drop">Abandonner</button>
      <button style="background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px;font-size:13px;color:var(--t2)" id="btn-cancel">Annuler</button>
    </div>
  </div>`;
  document.getElementById('overlays').appendChild(ov);
  ov.querySelector('#btn-save').onclick=()=>{ov.remove();saveSession();};
  ov.querySelector('#btn-drop').onclick=()=>{ov.remove();stopTimers();clearDraft();sess=null;view='home';R();};
  ov.querySelector('#btn-cancel').onclick=()=>ov.remove();
}

// ══════════════════ REST TIMER ══════════════════
function startRest(dur,name) {
  if(restTmr)clearInterval(restTmr);
  restLeft=dur;restTotal=dur;restName=name;
  updateRestBanner();
  restTmr=setInterval(()=>{
    restLeft--;
    if(restLeft===10&&navigator.vibrate)navigator.vibrate(80);
    if(restLeft<=0){clearInterval(restTmr);restTmr=null;if(navigator.vibrate)navigator.vibrate([200,80,200]);}
    updateRestBanner();
  },1000);
}

function updateRestBanner() {
  const bar=document.getElementById('rest-bar');
  if(!bar)return;
  if(restLeft<=0){bar.style.display='none';return;}
  const pct=restLeft/restTotal*100;
  const warn=restLeft<=10;
  const col=warn?'#f97316':'#38bdf8';

function updateElapsed() {

function editProg(progId) {
  const base = allProgs(true)[progId];
  if(!base) return;
  let exList = (base.ex||[]).map(e=>Object.assign({},e));

  const ov = document.createElement('div');
  ov.className = 'overlay';
  document.getElementById('overlays').appendChild(ov);

  function draw() {
    const bank = EX_BANK.concat((base.ex||[]).filter(e=>!EX_BANK.find(b=>b.id===e.id)));
    const usedIds = new Set(exList.map(e=>e.id));

    const curHTML = exList.length ? exList.map((ex,i)=>
      '<div style="display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:8px;background:var(--s2);border:1px solid var(--bd);margin-bottom:4px">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+ex.nm+'</div>'
      +'<div style="font-size:10px;color:var(--t3)">'+ex.mu+' · '+ex.ns+'×'+ex.rp+'</div>'
      +'</div>'
      +'<div style="display:flex;gap:3px;flex-shrink:0">'
      +(i>0?'<button style="background:var(--s3);border:none;color:var(--t2);border-radius:5px;width:28px;height:28px;font-size:13px;cursor:pointer" data-up="'+i+'">↑</button>':'<div style="width:28px"></div>')
      +(i<exList.length-1?'<button style="background:var(--s3);border:none;color:var(--t2);border-radius:5px;width:28px;height:28px;font-size:13px;cursor:pointer" data-dn="'+i+'">↓</button>':'<div style="width:28px"></div>')
      +'<button style="background:#f8717122;border:1px solid #f8717133;color:var(--re);border-radius:5px;width:28px;height:28px;font-size:14px;cursor:pointer" data-rm="'+i+'">✕</button>'
      +'</div></div>'
    ).join('') : '<div style="padding:10px;text-align:center;color:var(--t3);font-size:12px">Aucun exercice</div>';

    const addHTML = bank.filter(e=>!usedIds.has(e.id)).map(e=>
      '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;background:var(--s3);border:1px solid var(--bd);margin-bottom:3px;cursor:pointer" data-add="'+e.id+'">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e.nm+'</div>'
      +'<div style="font-size:9px;color:var(--t3)">'+e.mu+' · '+e.ns+'×'+e.rp+'</div>'
      +'</div>'
      +'<span style="color:var(--gr);font-size:18px;flex-shrink:0">＋</span>'
      +'</div>'
    ).join('');

    ov.innerHTML =
      '<div class="panel">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
      +'<div><div style="font-size:18px;font-weight:900">ÉDITER</div><div style="font-size:12px;color:var(--t2);margin-top:2px">'+base.name+'</div></div>'
      +'<button id="ep-x" style="background:var(--s2);border:none;color:var(--t2);border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer">✕</button>'
      +'</div>'
      +'<div style="font-size:11px;color:var(--t3);margin-bottom:8px;letter-spacing:.06em">EXERCICES ('+exList.length+')</div>'
      +'<div id="ep-cur" style="max-height:200px;overflow-y:auto;margin-bottom:14px">'+curHTML+'</div>'
      +'<div style="font-size:11px;color:var(--t3);margin-bottom:8px;letter-spacing:.06em">AJOUTER</div>'
      +'<div id="ep-add" style="max-height:170px;overflow-y:auto;margin-bottom:16px">'+addHTML+'</div>'
      +'<button id="ep-save" style="width:100%;background:#00e5a0;color:#000;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:900;cursor:pointer">ENREGISTRER</button>'
      +'</div>';

    ov.querySelector('#ep-x').onclick = function(){ ov.remove(); };
    ov.querySelector('#ep-save').onclick = function(){
      if(!exList.length){ alert('Ajoute au moins un exercice'); return; }
      if(PROGS[progId]) {
        var copy = Object.assign({},base,{id:'up_'+Date.now(),ex:exList});
        userProgs = userProgs.concat([copy]);
        cfg.hidden = (cfg.hidden||[]).filter(function(x){return x!==progId;}).concat([progId]);
        LS('pt_c',cfg);
      } else {
        userProgs = userProgs.map(function(p){ return p.id===progId ? Object.assign({},p,{ex:exList}) : p; });
      }
      LS('pt_p',userProgs);
      ov.remove();
      view='home'; R();
    };
    ov.querySelector('#ep-cur').onclick = function(e){
      var btn = e.target.closest('[data-rm],[data-up],[data-dn]');
      if(!btn) return;
      var i = parseInt(btn.getAttribute('data-rm')||btn.getAttribute('data-up')||btn.getAttribute('data-dn'));
      if(btn.hasAttribute('data-rm')){ exList.splice(i,1); }
      else if(btn.hasAttribute('data-up') && i>0){ var tmp=exList[i-1];exList[i-1]=exList[i];exList[i]=tmp; }
      else if(btn.hasAttribute('data-dn') && i<exList.length-1){ var tmp2=exList[i];exList[i]=exList[i+1];exList[i+1]=tmp2; }
      draw();
    };
    ov.querySelector('#ep-add').onclick = function(e){
      var row = e.target.closest('[data-add]');
      if(!row) return;
      var id = row.getAttribute('data-add');
      var ex = bank.find(function(b){ return b.id===id; });
      if(ex){ exList.push(Object.assign({},ex)); draw(); }
    };
  }

  draw();
}

        if(d.sessions){sessions=d.sessions;LS('pt_s',sessions);}
        if(d.cfg){cfg=d.cfg;LS('pt_c',cfg);}
        if(d.userProgs){userProgs=d.userProgs;LS('pt_p',userProgs);}
        ov.remove();alert('✓ Données restaurées');R();
      }catch(err){alert('Erreur: '+err.message);}
    };r.readAsText(f);
  };
  ov.querySelector('#s-csv').onclick=()=>{
    const rows=[['Date','Programme','Exercice','Groupe','Série','Poids(kg)','Reps']];
    sessions.forEach(s=>{const p=allProgs()[s.tpl]||{name:s.tpl};s.ex.forEach(e=>e.sets.forEach((st,i)=>rows.push([s.date,p.name,e.nm,e.mu,i+1,st.w||0,st.r||0])));});
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+rows.map(r=>r.join(';')).join('\n')],{type:'text/csv;charset=utf-8'}));a.download='perftrack.csv';a.click();
  };
}

      +bank.map(b=>'<option value="'+b.id+'">'+b.nm+'</option>').join('')
      +'</select>'
      +'</div>'
    ).join('');

    ov.innerHTML =
      '<div class="panel">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
      +'<div style="font-size:18px;font-weight:900">MODIFIER LA SÉANCE</div>'
      +'<button id="ae-x" style="background:var(--s2);border:none;color:var(--t2);border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer">✕</button>'
      +'</div>'

      +'<div style="max-height:180px;overflow-y:auto">'+replRows+'</div>'
      +'</div>';

    ov.querySelector('#ae-x').onclick = function(){ ov.remove(); };

    ov.querySelectorAll('[data-addex]').forEach(function(row){
      row.onclick = function(){
        const id = row.getAttribute('data-addex');
        const ex = bank.find(function(b){ return b.id===id; });
        if(!ex) return;
        const newEx = Object.assign({},ex,{sets:mkSets(ex),skipped:false});
        sess.ex.push(newEx);
        usedIds.add(id);
        expandedEx.add(sess.ex.length-1);
        saveDraft();
        ov.remove(); R();
      };
    });

    ov.querySelectorAll('[data-replsel]').forEach(function(sel){
      sel.onchange = function(){
        const xi = +sel.getAttribute('data-replsel');
        const newId = sel.value;
        if(!newId) return;
        const newEx = bank.find(function(b){ return b.id===newId; });
        if(!newEx) return;
        if(!confirm('Remplacer "'+sess.ex[xi].nm+'" par "'+newEx.nm+'" ?')){ sel.value=''; return; }
        sess.ex[xi] = Object.assign({},newEx,{sets:mkSets(newEx),skipped:false});
        saveDraft();
        ov.remove(); R();
      };
    });
  }

  drawAddEx();
  document.getElementById('overlays').appendChild(ov);
}

// ══════════════════ INIT ══════════════════
(function init(){
  // Restore interrupted session
  const draft=LS('pt_draft');
  if(draft&&draft.sess){
    const done=draft.sess.ex.flatMap(e=>e.sets).filter(s=>s.done).length;
    if(done>0){
      const ov=document.createElement('div');ov.className='overlay';
      ov.innerHTML=`<div class="panel" style="text-align:center">
        <div style="font-size:32px;margin-bottom:12px">💾</div>
        <div style="font-size:17px;font-weight:900;margin-bottom:8px">SÉANCE INTERROMPUE</div>
        <div style="font-size:13px;color:var(--t2);margin-bottom:20px">${done} série(s) déjà validée(s) — reprendre ?</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn" style="background:#00e5a0;color:#000;border:none;font-weight:800" id="d-yes">▶ Reprendre</button>
          <button class="btn" style="background:var(--s2);color:var(--t2);border:1px solid var(--bd)" id="d-no">Ignorer</button>
        </div>
      </div>`;
      document.getElementById('overlays').appendChild(ov);
      ov.querySelector('#d-yes').onclick=()=>{ov.remove();sess=draft.sess;sessStart=draft.start||Date.now();expandedEx=new Set([0]);view='session';startElapsed();R();};
      ov.querySelector('#d-no').onclick=()=>{clearDraft();ov.remove();};
    }
  }
  R();
})();
</script>
</body>
</html>
